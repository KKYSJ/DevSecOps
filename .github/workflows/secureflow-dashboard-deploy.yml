name: SecureFlow Dashboard Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select deployment target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
  workflow_call:
    inputs:
      environment:
        required: false
        default: "dev"
        type: string
      deployment_mode:
        required: false
        default: "infra_only"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: secureflow-dashboard-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: secureflow-dashboard
      MANAGED_BY: admin-dev
      VPC_CIDR: 10.50.0.0/16
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      ALARM_EMAIL: ${{ vars.ALARM_EMAIL }}
      ACM_CERTIFICATE_ARN: ${{ vars.ACM_CERTIFICATE_ARN }}
      TF_VAR_actions_upload_bypass_key: ${{ secrets.SECUREFLOW_UPLOAD_KEY }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_LOCK_RETRY_ATTEMPTS: "10"
      TF_LOCK_RETRY_SLEEP_SECONDS: "30"
      TF_LOCK_STALE_MINUTES: "45"
      ARTIFACT_DIR: ${{ github.workspace }}/artifacts/terraform

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect unresolved merge markers in deploy paths
        run: |
          set -euo pipefail

          if rg -n "^(<<<<<<<|=======|>>>>>>>)" \
            .github/workflows \
            backend \
            frontend \
            secureflow_dashboard_infra \
            -g '!backend/venv/**'; then
            echo "Unresolved merge markers were found in the current deployment paths."
            exit 1
          fi

      - name: Prepare log directory
        run: mkdir -p "${ARTIFACT_DIR}"

      - name: Check repository configuration
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          API_SERVER_URL: ${{ secrets.API_SERVER_URL }}
          SECUREFLOW_UPLOAD_KEY: ${{ secrets.SECUREFLOW_UPLOAD_KEY }}
        run: |
          set -euo pipefail
          missing=0
          effective_deployment_mode="${{ inputs.deployment_mode }}"

          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            effective_deployment_mode="service"
          fi

          if [ -z "${effective_deployment_mode}" ]; then
            effective_deployment_mode="infra_only"
          fi

          for name in AWS_REGION AWS_ACCOUNT_ID AWS_ROLE_TO_ASSUME; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub setting: $name"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          if [ "${effective_deployment_mode}" = "waf_only" ]; then
            if [ -z "${SECUREFLOW_UPLOAD_KEY}" ]; then
              echo "Missing required GitHub secret for WAF upload bypass: SECUREFLOW_UPLOAD_KEY"
              exit 1
            fi
          fi

          if [ "${effective_deployment_mode}" = "service" ]; then
            for name in GEMINI_MODEL SONAR_HOST_URL SONAR_ORGANIZATION SONAR_PROJECT_KEY; do
              if [ -z "${!name}" ]; then
                echo "Missing recommended GitHub variable for service deployment: $name"
              fi
            done

            for name in GEMINI_API_KEY SONAR_TOKEN SECUREFLOW_UPLOAD_KEY; do
              if [ -z "${!name}" ]; then
                echo "Missing recommended GitHub secret for service deployment: $name"
              fi
            done

            if [ -z "${API_SERVER_URL}" ]; then
              echo "Missing recommended GitHub secret for frontend API routing: API_SERVER_URL"
              echo "Frontend will fall back to /api/v1."
            fi
          fi

      - name: Start deployment summary
        run: |
          resolved_environment="${{ inputs.environment }}"
          resolved_mode="${{ inputs.deployment_mode }}"

          if [ "${{ github.event_name }}" = "push" ]; then
            resolved_environment="dev"
            resolved_mode="service"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            resolved_environment="${{ inputs.environment }}"
            resolved_mode="service"
          fi

          if [ -z "${resolved_environment}" ]; then
            resolved_environment="dev"
          fi

          if [ -z "${resolved_mode}" ]; then
            resolved_mode="infra_only"
          fi

          {
            echo "## SecureFlow Dashboard deployment started"
            echo ""
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Resolved environment: \`${resolved_environment}\`"
            echo "- Mode: \`${resolved_mode}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Resolve deploy context
        id: context
        run: |
          set -euo pipefail
          deploy_environment="${{ inputs.environment }}"
          deployment_mode="${{ inputs.deployment_mode }}"

          if [ "${{ github.event_name }}" = "push" ]; then
            deploy_environment="dev"
            deployment_mode="service"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            deployment_mode="service"
          fi

          if [ -z "${deploy_environment}" ]; then
            deploy_environment="dev"
          fi

          if [ -z "${deployment_mode}" ]; then
            deployment_mode="infra_only"
          fi

          if [ "${deployment_mode}" != "infra_only" ] && [ "${deployment_mode}" != "service" ] && [ "${deployment_mode}" != "waf_only" ]; then
            echo "deployment_mode must be waf_only, infra_only, or service."
            exit 1
          fi

          if [ "${deploy_environment}" = "prod" ] && [ "${GITHUB_REF_NAME}" != "SUN" ]; then
            echo "Production deploys are only allowed from the SUN branch."
            exit 1
          fi

          echo "deploy_environment=${deploy_environment}" >> "$GITHUB_OUTPUT"
          echo "deployment_mode=${deployment_mode}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA::12}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Resolve backend names
        id: backend
        run: |
          set -euo pipefail
          actual_account_id="$(aws sts get-caller-identity --query Account --output text)"

          if [ "${AWS_ACCOUNT_ID}" != "${actual_account_id}" ]; then
            echo "AWS_ACCOUNT_ID repository variable (${AWS_ACCOUNT_ID}) does not match the assumed account (${actual_account_id})."
            exit 1
          fi

          state_bucket="${PROJECT_NAME}-shared-${actual_account_id}-tfstate"
          lock_table="${PROJECT_NAME}-shared-tflock"

          echo "state_bucket=${state_bucket}" >> "$GITHUB_OUTPUT"
          echo "lock_table=${lock_table}" >> "$GITHUB_OUTPUT"

      - name: Ensure bootstrap remote state exists
        working-directory: secureflow_dashboard_infra/bootstrap
        env:
          STATE_BUCKET: ${{ steps.backend.outputs.state_bucket }}
          LOCK_TABLE: ${{ steps.backend.outputs.lock_table }}
        run: |
          set -euo pipefail
          STATE_KEY="secureflow_dashboard_infra/bootstrap/terraform.tfstate"
          KMS_ALIAS_NAME="alias/${PROJECT_NAME}-shared-terraform-state"

          cat > backend.hcl <<EOF
          bucket         = "${STATE_BUCKET}"
          key            = "${STATE_KEY}"
          region         = "${AWS_REGION}"
          dynamodb_table = "${LOCK_TABLE}"
          encrypt        = true
          EOF

          bucket_exists=0
          table_exists=0
          state_exists=0

          if aws s3api head-bucket --bucket "${STATE_BUCKET}" >/dev/null 2>&1; then
            bucket_exists=1
          fi

          if aws dynamodb describe-table --table-name "${LOCK_TABLE}" --region "${AWS_REGION}" >/dev/null 2>&1; then
            table_exists=1
          fi

          if [ "${bucket_exists}" -eq 1 ] && aws s3api head-object --bucket "${STATE_BUCKET}" --key "${STATE_KEY}" >/dev/null 2>&1; then
            state_exists=1
          fi

          echo "bucket_exists=${bucket_exists}" | tee "${ARTIFACT_DIR}/bootstrap-state-check.log"
          echo "table_exists=${table_exists}" | tee -a "${ARTIFACT_DIR}/bootstrap-state-check.log"
          echo "state_exists=${state_exists}" | tee -a "${ARTIFACT_DIR}/bootstrap-state-check.log"

          if [ "${bucket_exists}" -eq 1 ] && [ "${table_exists}" -eq 1 ] && [ "${state_exists}" -eq 1 ]; then
            terraform init -no-color -reconfigure -backend-config=backend.hcl 2>&1 | tee "${ARTIFACT_DIR}/bootstrap-init.log"
            terraform apply -no-color -auto-approve \
              -var="project_name=${PROJECT_NAME}" \
              -var="environment=shared" \
              -var="managed_by=${MANAGED_BY}" \
              -var="aws_region=${AWS_REGION}" \
              -var="state_bucket_name=${STATE_BUCKET}" \
              -var="lock_table_name=${LOCK_TABLE}" \
              2>&1 | tee "${ARTIFACT_DIR}/bootstrap-apply.log"
          elif [ "${bucket_exists}" -eq 0 ] && [ "${table_exists}" -eq 0 ] && [ "${state_exists}" -eq 0 ]; then
            cp providers.tf providers.tf.remote-backend.bak
            restore_backend() {
              if [ -f providers.tf.remote-backend.bak ]; then
                mv providers.tf.remote-backend.bak providers.tf
              fi
            }
            trap restore_backend EXIT

            grep -Fv 'backend "s3" {}' providers.tf.remote-backend.bak > providers.tf

            terraform init -no-color 2>&1 | tee "${ARTIFACT_DIR}/bootstrap-init.log"
            terraform apply -no-color -auto-approve \
              -var="project_name=${PROJECT_NAME}" \
              -var="environment=shared" \
              -var="managed_by=${MANAGED_BY}" \
              -var="aws_region=${AWS_REGION}" \
              -var="state_bucket_name=${STATE_BUCKET}" \
              -var="lock_table_name=${LOCK_TABLE}" \
              2>&1 | tee "${ARTIFACT_DIR}/bootstrap-apply.log"

            restore_backend
            trap - EXIT

            terraform init -no-color -migrate-state -force-copy -backend-config=backend.hcl 2>&1 | tee -a "${ARTIFACT_DIR}/bootstrap-init.log"
            terraform apply -no-color -auto-approve \
              -var="project_name=${PROJECT_NAME}" \
              -var="environment=shared" \
              -var="managed_by=${MANAGED_BY}" \
              -var="aws_region=${AWS_REGION}" \
              -var="state_bucket_name=${STATE_BUCKET}" \
              -var="lock_table_name=${LOCK_TABLE}" \
              2>&1 | tee -a "${ARTIFACT_DIR}/bootstrap-apply.log"
          elif [ "${bucket_exists}" -eq 1 ] && [ "${table_exists}" -eq 1 ] && [ "${state_exists}" -eq 0 ]; then
            kms_key_id="$(aws kms describe-key --key-id "${KMS_ALIAS_NAME}" --query 'KeyMetadata.KeyId' --output text 2>/dev/null || true)"

            if [ -z "${kms_key_id}" ] || [ "${kms_key_id}" = "None" ]; then
              {
                echo "Bootstrap recovery could not continue because the KMS alias was not found."
                echo "Expected alias: ${KMS_ALIAS_NAME}"
              } | tee -a "${ARTIFACT_DIR}/bootstrap-state-check.log"
              exit 1
            fi

            cp providers.tf providers.tf.remote-backend.bak
            restore_backend() {
              if [ -f providers.tf.remote-backend.bak ]; then
                mv providers.tf.remote-backend.bak providers.tf
              fi
            }
            trap restore_backend EXIT

            grep -Fv 'backend "s3" {}' providers.tf.remote-backend.bak > providers.tf

            terraform init -no-color 2>&1 | tee "${ARTIFACT_DIR}/bootstrap-init.log"
            terraform import -no-color aws_s3_bucket.terraform_state "${STATE_BUCKET}" 2>&1 | tee "${ARTIFACT_DIR}/bootstrap-import.log"
            terraform import -no-color aws_dynamodb_table.terraform_lock "${LOCK_TABLE}" 2>&1 | tee -a "${ARTIFACT_DIR}/bootstrap-import.log"
            terraform import -no-color aws_kms_key.terraform_state "${kms_key_id}" 2>&1 | tee -a "${ARTIFACT_DIR}/bootstrap-import.log"
            terraform import -no-color aws_kms_alias.terraform_state "${KMS_ALIAS_NAME}" 2>&1 | tee -a "${ARTIFACT_DIR}/bootstrap-import.log"
            terraform apply -no-color -auto-approve \
              -var="project_name=${PROJECT_NAME}" \
              -var="environment=shared" \
              -var="managed_by=${MANAGED_BY}" \
              -var="aws_region=${AWS_REGION}" \
              -var="state_bucket_name=${STATE_BUCKET}" \
              -var="lock_table_name=${LOCK_TABLE}" \
              2>&1 | tee "${ARTIFACT_DIR}/bootstrap-apply.log"

            restore_backend
            trap - EXIT

            terraform init -no-color -migrate-state -force-copy -backend-config=backend.hcl 2>&1 | tee -a "${ARTIFACT_DIR}/bootstrap-init.log"
            terraform apply -no-color -auto-approve \
              -var="project_name=${PROJECT_NAME}" \
              -var="environment=shared" \
              -var="managed_by=${MANAGED_BY}" \
              -var="aws_region=${AWS_REGION}" \
              -var="state_bucket_name=${STATE_BUCKET}" \
              -var="lock_table_name=${LOCK_TABLE}" \
              2>&1 | tee -a "${ARTIFACT_DIR}/bootstrap-apply.log"

            {
              echo "## Bootstrap state recovered"
              echo ""
              echo "- State bucket: \`${STATE_BUCKET}\`"
              echo "- Lock table: \`${LOCK_TABLE}\`"
              echo "- KMS alias: \`${KMS_ALIAS_NAME}\`"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "Bootstrap backend is in a partial state."
              echo "bucket_exists=${bucket_exists}"
              echo "table_exists=${table_exists}"
              echo "state_exists=${state_exists}"
              echo "Expected state key: ${STATE_KEY}"
            } | tee -a "${ARTIFACT_DIR}/bootstrap-state-check.log"
            exit 1
          fi

      - name: Write Terraform backend config
        working-directory: secureflow_dashboard_infra
        env:
          STATE_BUCKET: ${{ steps.backend.outputs.state_bucket }}
          LOCK_TABLE: ${{ steps.backend.outputs.lock_table }}
        run: |
          set -euo pipefail
          cat > backend.hcl <<EOF
          bucket         = "${STATE_BUCKET}"
          key            = "secureflow_dashboard_infra/terraform.tfstate"
          region         = "${AWS_REGION}"
          dynamodb_table = "${LOCK_TABLE}"
          encrypt        = true
          EOF

      - name: Write Terraform WAF-only runtime config
        if: steps.context.outputs.deployment_mode == 'waf_only'
        working-directory: secureflow_dashboard_infra
        env:
          DEPLOY_ENVIRONMENT: ${{ steps.context.outputs.deploy_environment }}
        run: |
          set -euo pipefail

          jq -n \
            --arg project_name "${PROJECT_NAME}" \
            --arg environment "${DEPLOY_ENVIRONMENT}" \
            --arg managed_by "${MANAGED_BY}" \
            --arg aws_region "${AWS_REGION}" \
            --arg vpc_cidr "${VPC_CIDR}" \
            --arg alarm_email "${ALARM_EMAIL}" \
            --arg acm_certificate_arn "${ACM_CERTIFICATE_ARN}" \
            '{
              project_name: $project_name,
              environment: $environment,
              managed_by: $managed_by,
              aws_region: $aws_region,
              vpc_cidr: $vpc_cidr
            }
            + (if $alarm_email != "" then {alarm_email: $alarm_email} else {} end)
            + (if $acm_certificate_arn != "" then {acm_certificate_arn: $acm_certificate_arn} else {} end)' \
            > ci.auto.tfvars.json

      - name: Write Terraform infra-only runtime config
        if: steps.context.outputs.deployment_mode == 'infra_only'
        working-directory: secureflow_dashboard_infra
        env:
          DEPLOY_ENVIRONMENT: ${{ steps.context.outputs.deploy_environment }}
          IMAGE_TAG: ${{ steps.context.outputs.image_tag }}
        run: |
          set -euo pipefail

          jq -n \
            --arg project_name "${PROJECT_NAME}" \
            --arg environment "${DEPLOY_ENVIRONMENT}" \
            --arg managed_by "${MANAGED_BY}" \
            --arg aws_region "${AWS_REGION}" \
            --arg vpc_cidr "${VPC_CIDR}" \
            --arg frontend_image_tag "${IMAGE_TAG}" \
            --arg backend_image_tag "${IMAGE_TAG}" \
            --arg worker_image_tag "${IMAGE_TAG}" \
            --arg gemini_model "${GEMINI_MODEL}" \
            --arg sonar_host_url "${SONAR_HOST_URL}" \
            --arg sonar_organization "${SONAR_ORGANIZATION}" \
            --arg sonar_project_key "${SONAR_PROJECT_KEY}" \
            --arg alarm_email "${ALARM_EMAIL}" \
            --arg acm_certificate_arn "${ACM_CERTIFICATE_ARN}" \
            --argjson frontend_desired_count 0 \
            --argjson backend_desired_count 0 \
            --argjson worker_desired_count 0 \
            '{
              project_name: $project_name,
              environment: $environment,
              managed_by: $managed_by,
              aws_region: $aws_region,
              vpc_cidr: $vpc_cidr,
              frontend_image_tag: $frontend_image_tag,
              backend_image_tag: $backend_image_tag,
              worker_image_tag: $worker_image_tag,
              gemini_model: $gemini_model,
              sonar_host_url: $sonar_host_url,
              sonar_organization: $sonar_organization,
              sonar_project_key: $sonar_project_key,
              frontend_desired_count: $frontend_desired_count,
              backend_desired_count: $backend_desired_count,
              worker_desired_count: $worker_desired_count
            }
            + (if $alarm_email != "" then {alarm_email: $alarm_email} else {} end)
            + (if $acm_certificate_arn != "" then {acm_certificate_arn: $acm_certificate_arn} else {} end)' \
            > ci.auto.tfvars.json

      - name: Initialize dashboard terraform
        working-directory: secureflow_dashboard_infra
        run: |
          set -euo pipefail
          terraform init -no-color -reconfigure -backend-config=backend.hcl 2>&1 | tee "${ARTIFACT_DIR}/dashboard-init.log"

      - name: Validate dashboard terraform
        working-directory: secureflow_dashboard_infra
        run: |
          set -euo pipefail
          terraform validate -no-color 2>&1 | tee "${ARTIFACT_DIR}/dashboard-validate.log"

      - name: Verify existing dashboard state for service deploy
        if: steps.context.outputs.deployment_mode == 'service'
        working-directory: secureflow_dashboard_infra
        run: |
          set -euo pipefail
          terraform output -json > "${ARTIFACT_DIR}/dashboard-existing-outputs.json"

      - name: Plan WAF-only changes
        if: steps.context.outputs.deployment_mode == 'waf_only'
        working-directory: secureflow_dashboard_infra
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/scripts/ci/terraform_with_lock_recovery.sh" "${ARTIFACT_DIR}/dashboard-waf-plan.log" \
            terraform plan -no-color \
            -target=aws_wafv2_web_acl.alb \
            -target=aws_wafv2_web_acl_association.alb \
            -target=aws_wafv2_web_acl_logging_configuration.alb \
            -target=aws_wafv2_web_acl.cloudfront \
            -target=aws_wafv2_web_acl_logging_configuration.cloudfront \
            -target=aws_cloudfront_distribution.app \
            -out=tfplan-waf
          terraform show -no-color tfplan-waf > "${ARTIFACT_DIR}/dashboard-waf-plan.txt"

      - name: Apply WAF-only changes
        if: steps.context.outputs.deployment_mode == 'waf_only'
        working-directory: secureflow_dashboard_infra
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/scripts/ci/terraform_with_lock_recovery.sh" "${ARTIFACT_DIR}/dashboard-waf-apply.log" \
            terraform apply -no-color -auto-approve tfplan-waf

      - name: Plan base dashboard infrastructure
        if: steps.context.outputs.deployment_mode == 'infra_only'
        working-directory: secureflow_dashboard_infra
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/scripts/ci/terraform_with_lock_recovery.sh" "${ARTIFACT_DIR}/dashboard-plan.log" \
            terraform plan -no-color -out=tfplan
          terraform show -no-color tfplan > "${ARTIFACT_DIR}/dashboard-plan.txt"

      - name: Apply base dashboard infrastructure
        if: steps.context.outputs.deployment_mode == 'infra_only'
        working-directory: secureflow_dashboard_infra
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/scripts/ci/terraform_with_lock_recovery.sh" "${ARTIFACT_DIR}/dashboard-apply.log" \
            terraform apply -no-color -auto-approve tfplan

      - name: Resolve service deployment targets
        if: steps.context.outputs.deployment_mode == 'service'
        id: service_targets
        working-directory: secureflow_dashboard_infra
        run: |
          set -euo pipefail
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "frontend_service_name=$(terraform output -raw frontend_service_name)" >> "$GITHUB_OUTPUT"
          echo "backend_service_name=$(terraform output -raw backend_service_name)" >> "$GITHUB_OUTPUT"
          echo "worker_service_name=$(terraform output -raw worker_service_name)" >> "$GITHUB_OUTPUT"
          echo "frontend_repo=$(terraform output -raw frontend_ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "backend_repo=$(terraform output -raw backend_ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "worker_repo=$(terraform output -raw worker_ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "external_api_secret_arn=$(terraform output -raw external_api_secret_arn)" >> "$GITHUB_OUTPUT"

      - name: Detect changed services
        if: steps.context.outputs.deployment_mode == 'service'
        id: service_changes
        shell: bash
        run: |
          set -euo pipefail

          frontend_changed="false"
          backend_changed="false"
          worker_changed="false"
          service_infra_changed="false"

          if [ "${{ github.event_name }}" != "push" ]; then
            frontend_changed="true"
            backend_changed="true"
            worker_changed="true"
            service_infra_changed="true"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
              frontend_changed="true"
              backend_changed="true"
              worker_changed="true"
              service_infra_changed="true"
            else
              git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}" > /tmp/changed-files.txt
              echo "Changed files:"
              cat /tmp/changed-files.txt || true

              while IFS= read -r file; do
                [ -n "${file}" ] || continue

                if [[ "${file}" == frontend/* ]]; then
                  frontend_changed="true"
                fi

                if [[ "${file}" == backend/* ]]; then
                  backend_changed="true"
                  worker_changed="true"
                fi

                if [[ "${file}" == secureflow_dashboard_infra/docker/* ]]; then
                  worker_changed="true"
                fi

                if [[ "${file}" == .github/workflows/secureflow-dashboard-deploy.yml ]] || [[ "${file}" =~ ^secureflow_dashboard_infra/.*\.(tf|tfvars|hcl)$ ]]; then
                  service_infra_changed="true"
                fi
              done < /tmp/changed-files.txt
            fi
          fi

          # Terraform and workflow changes can affect all runtime services, so keep rollout conservative.
          if [ "${service_infra_changed}" = "true" ]; then
            frontend_changed="true"
            backend_changed="true"
            worker_changed="true"
          fi

          service_rollout_required="false"
          if [ "${frontend_changed}" = "true" ] || [ "${backend_changed}" = "true" ] || [ "${worker_changed}" = "true" ]; then
            service_rollout_required="true"
          fi

          echo "frontend_changed=${frontend_changed}" >> "$GITHUB_OUTPUT"
          echo "backend_changed=${backend_changed}" >> "$GITHUB_OUTPUT"
          echo "worker_changed=${worker_changed}" >> "$GITHUB_OUTPUT"
          echo "service_infra_changed=${service_infra_changed}" >> "$GITHUB_OUTPUT"
          echo "service_rollout_required=${service_rollout_required}" >> "$GITHUB_OUTPUT"

      - name: Resolve current ECS service state
        if: steps.context.outputs.deployment_mode == 'service'
        id: current_service_state
        shell: bash
        env:
          ECS_CLUSTER_NAME: ${{ steps.service_targets.outputs.ecs_cluster_name }}
          FRONTEND_SERVICE_NAME: ${{ steps.service_targets.outputs.frontend_service_name }}
          BACKEND_SERVICE_NAME: ${{ steps.service_targets.outputs.backend_service_name }}
          WORKER_SERVICE_NAME: ${{ steps.service_targets.outputs.worker_service_name }}
        run: |
          set -euo pipefail

          resolve_service_state() {
            local service_name="$1"
            local container_name="$2"
            local output_prefix="$3"
            local service_json
            local task_definition
            local image_uri
            local desired_count

            service_json="$(aws ecs describe-services \
              --cluster "${ECS_CLUSTER_NAME}" \
              --services "${service_name}")"

            task_definition="$(echo "${service_json}" | jq -r '.services[0].taskDefinition // empty')"
            desired_count="$(echo "${service_json}" | jq -r '.services[0].desiredCount // empty')"

            if [ -z "${task_definition}" ] || [ "${task_definition}" = "null" ]; then
              echo "Unable to resolve task definition for ${service_name}" >&2
              exit 1
            fi

            if [ -z "${desired_count}" ] || [ "${desired_count}" = "null" ]; then
              desired_count="1"
            fi

            image_uri="$(aws ecs describe-task-definition \
              --task-definition "${task_definition}" \
              --query "taskDefinition.containerDefinitions[?name=='${container_name}'].image | [0]" \
              --output text)"

            if [ -z "${image_uri}" ] || [ "${image_uri}" = "None" ]; then
              echo "Unable to resolve image URI for ${service_name}" >&2
              exit 1
            fi

            echo "${output_prefix}_task_definition=${task_definition}" >> "$GITHUB_OUTPUT"
            echo "${output_prefix}_image_uri=${image_uri}" >> "$GITHUB_OUTPUT"
            echo "${output_prefix}_image_tag=${image_uri##*:}" >> "$GITHUB_OUTPUT"
            echo "${output_prefix}_desired_count=${desired_count}" >> "$GITHUB_OUTPUT"
          }

          resolve_service_state "${FRONTEND_SERVICE_NAME}" "frontend" "frontend"
          resolve_service_state "${BACKEND_SERVICE_NAME}" "backend" "backend"
          resolve_service_state "${WORKER_SERVICE_NAME}" "worker" "worker"

      - name: Plan changed ECS rollout
        if: steps.context.outputs.deployment_mode == 'service'
        id: rollout_plan
        shell: bash
        env:
          DEFAULT_IMAGE_TAG: ${{ steps.context.outputs.image_tag }}
        run: |
          set -euo pipefail

          deploy_frontend="${{ steps.service_changes.outputs.frontend_changed }}"
          deploy_backend="${{ steps.service_changes.outputs.backend_changed }}"
          deploy_worker="${{ steps.service_changes.outputs.worker_changed }}"
          service_rollout_required="${{ steps.service_changes.outputs.service_rollout_required }}"

          frontend_image_tag="${{ steps.current_service_state.outputs.frontend_image_tag }}"
          backend_image_tag="${{ steps.current_service_state.outputs.backend_image_tag }}"
          worker_image_tag="${{ steps.current_service_state.outputs.worker_image_tag }}"

          if [ "${deploy_frontend}" = "true" ]; then
            frontend_image_tag="${DEFAULT_IMAGE_TAG}"
          fi

          if [ "${deploy_backend}" = "true" ]; then
            backend_image_tag="${DEFAULT_IMAGE_TAG}"
          fi

          if [ "${deploy_worker}" = "true" ]; then
            worker_image_tag="${DEFAULT_IMAGE_TAG}"
          fi

          target_args=""
          if [ "${deploy_frontend}" = "true" ]; then
            target_args="${target_args} -target=aws_ecs_task_definition.frontend -target=aws_ecs_service.frontend"
          fi
          if [ "${deploy_backend}" = "true" ]; then
            target_args="${target_args} -target=aws_ecs_task_definition.backend -target=aws_ecs_service.backend"
          fi
          if [ "${deploy_worker}" = "true" ]; then
            target_args="${target_args} -target=aws_ecs_task_definition.worker -target=aws_ecs_service.worker"
          fi
          target_args="${target_args# }"

          update_runtime_secrets="false"
          if [ "${deploy_backend}" = "true" ] || [ "${deploy_worker}" = "true" ]; then
            update_runtime_secrets="true"
          fi

          echo "deploy_frontend=${deploy_frontend}" >> "$GITHUB_OUTPUT"
          echo "deploy_backend=${deploy_backend}" >> "$GITHUB_OUTPUT"
          echo "deploy_worker=${deploy_worker}" >> "$GITHUB_OUTPUT"
          echo "service_rollout_required=${service_rollout_required}" >> "$GITHUB_OUTPUT"
          echo "update_runtime_secrets=${update_runtime_secrets}" >> "$GITHUB_OUTPUT"
          echo "frontend_image_tag=${frontend_image_tag}" >> "$GITHUB_OUTPUT"
          echo "backend_image_tag=${backend_image_tag}" >> "$GITHUB_OUTPUT"
          echo "worker_image_tag=${worker_image_tag}" >> "$GITHUB_OUTPUT"
          echo "frontend_desired_count=${{ steps.current_service_state.outputs.frontend_desired_count }}" >> "$GITHUB_OUTPUT"
          echo "backend_desired_count=${{ steps.current_service_state.outputs.backend_desired_count }}" >> "$GITHUB_OUTPUT"
          echo "worker_desired_count=${{ steps.current_service_state.outputs.worker_desired_count }}" >> "$GITHUB_OUTPUT"
          {
            echo "target_args<<EOF"
            echo "${target_args}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize service rollout plan
        if: steps.context.outputs.deployment_mode == 'service'
        run: |
          {
            echo "## ECS rollout plan"
            echo ""
            echo "- Frontend update: \`${{ steps.rollout_plan.outputs.deploy_frontend }}\`"
            echo "- Backend update: \`${{ steps.rollout_plan.outputs.deploy_backend }}\`"
            echo "- Worker update: \`${{ steps.rollout_plan.outputs.deploy_worker }}\`"
            echo "- Rollout required: \`${{ steps.rollout_plan.outputs.service_rollout_required }}\`"
            echo "- Frontend tag: \`${{ steps.rollout_plan.outputs.frontend_image_tag }}\`"
            echo "- Backend tag: \`${{ steps.rollout_plan.outputs.backend_image_tag }}\`"
            echo "- Worker tag: \`${{ steps.rollout_plan.outputs.worker_image_tag }}\`"
            echo "- Frontend desired count: \`${{ steps.rollout_plan.outputs.frontend_desired_count }}\`"
            echo "- Backend desired count: \`${{ steps.rollout_plan.outputs.backend_desired_count }}\`"
            echo "- Worker desired count: \`${{ steps.rollout_plan.outputs.worker_desired_count }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Log in to Amazon ECR
        if: steps.context.outputs.deployment_mode == 'service' && steps.rollout_plan.outputs.service_rollout_required == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        if: steps.context.outputs.deployment_mode == 'service' && steps.rollout_plan.outputs.deploy_backend == 'true'
        env:
          IMAGE_TAG: ${{ steps.context.outputs.image_tag }}
          BACKEND_REPO: ${{ steps.service_targets.outputs.backend_repo }}
        run: |
          set -euo pipefail
          docker build -f backend/Dockerfile -t "${BACKEND_REPO}:${IMAGE_TAG}" . 2>&1 | tee "${ARTIFACT_DIR}/docker-backend-build.log"
          docker push "${BACKEND_REPO}:${IMAGE_TAG}" 2>&1 | tee "${ARTIFACT_DIR}/docker-backend-push.log"

      - name: Build and push worker image
        if: steps.context.outputs.deployment_mode == 'service' && steps.rollout_plan.outputs.deploy_worker == 'true'
        env:
          IMAGE_TAG: ${{ steps.context.outputs.image_tag }}
          WORKER_REPO: ${{ steps.service_targets.outputs.worker_repo }}
        run: |
          set -euo pipefail
          docker build -f secureflow_dashboard_infra/docker/Dockerfile.worker -t "${WORKER_REPO}:${IMAGE_TAG}" . 2>&1 | tee "${ARTIFACT_DIR}/docker-worker-build.log"
          docker push "${WORKER_REPO}:${IMAGE_TAG}" 2>&1 | tee "${ARTIFACT_DIR}/docker-worker-push.log"

      - name: Build and push frontend image
        if: steps.context.outputs.deployment_mode == 'service' && steps.rollout_plan.outputs.deploy_frontend == 'true'
        env:
          IMAGE_TAG: ${{ steps.context.outputs.image_tag }}
          FRONTEND_REPO: ${{ steps.service_targets.outputs.frontend_repo }}
          API_SERVER_URL: ${{ secrets.API_SERVER_URL }}
        run: |
          set -euo pipefail
          frontend_api_base_url="${API_SERVER_URL:-/api/v1}"
          docker build \
            -f frontend/Dockerfile \
            --build-arg "REACT_APP_API_BASE_URL=${frontend_api_base_url}" \
            --build-arg "VITE_API_BASE_URL=${frontend_api_base_url}" \
            -t "${FRONTEND_REPO}:${IMAGE_TAG}" \
            frontend 2>&1 | tee "${ARTIFACT_DIR}/docker-frontend-build.log"
          docker push "${FRONTEND_REPO}:${IMAGE_TAG}" 2>&1 | tee "${ARTIFACT_DIR}/docker-frontend-push.log"

      - name: Populate external API secret
        if: steps.context.outputs.deployment_mode == 'service' && steps.rollout_plan.outputs.update_runtime_secrets == 'true'
        env:
          EXTERNAL_API_SECRET_ARN: ${{ steps.service_targets.outputs.external_api_secret_arn }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail
          payload="$(jq -nc \
            --arg gemini "${GEMINI_API_KEY}" \
            --arg openai "${OPENAI_API_KEY}" \
            --arg sonar "${SONAR_TOKEN}" \
            '{GEMINI_API_KEY: $gemini, OPENAI_API_KEY: $openai, SONAR_TOKEN: $sonar}')"

          aws secretsmanager put-secret-value \
            --secret-id "${EXTERNAL_API_SECRET_ARN}" \
            --secret-string "${payload}" \
            > "${ARTIFACT_DIR}/external-api-secret-version.json"

      - name: Write Terraform service runtime config
        if: steps.context.outputs.deployment_mode == 'service'
        working-directory: secureflow_dashboard_infra
        env:
          DEPLOY_ENVIRONMENT: ${{ steps.context.outputs.deploy_environment }}
          FRONTEND_IMAGE_TAG: ${{ steps.rollout_plan.outputs.frontend_image_tag }}
          BACKEND_IMAGE_TAG: ${{ steps.rollout_plan.outputs.backend_image_tag }}
          WORKER_IMAGE_TAG: ${{ steps.rollout_plan.outputs.worker_image_tag }}
          FRONTEND_DESIRED_COUNT: ${{ steps.rollout_plan.outputs.frontend_desired_count }}
          BACKEND_DESIRED_COUNT: ${{ steps.rollout_plan.outputs.backend_desired_count }}
          WORKER_DESIRED_COUNT: ${{ steps.rollout_plan.outputs.worker_desired_count }}
        run: |
          set -euo pipefail
          jq -n \
            --arg project_name "${PROJECT_NAME}" \
            --arg environment "${DEPLOY_ENVIRONMENT}" \
            --arg managed_by "${MANAGED_BY}" \
            --arg aws_region "${AWS_REGION}" \
            --arg vpc_cidr "${VPC_CIDR}" \
            --arg frontend_image_tag "${FRONTEND_IMAGE_TAG}" \
            --arg backend_image_tag "${BACKEND_IMAGE_TAG}" \
            --arg worker_image_tag "${WORKER_IMAGE_TAG}" \
            --arg gemini_model "${GEMINI_MODEL}" \
            --arg sonar_host_url "${SONAR_HOST_URL}" \
            --arg sonar_organization "${SONAR_ORGANIZATION}" \
            --arg sonar_project_key "${SONAR_PROJECT_KEY}" \
            --arg alarm_email "${ALARM_EMAIL}" \
            --arg acm_certificate_arn "${ACM_CERTIFICATE_ARN}" \
            --argjson frontend_desired_count "${FRONTEND_DESIRED_COUNT}" \
            --argjson backend_desired_count "${BACKEND_DESIRED_COUNT}" \
            --argjson worker_desired_count "${WORKER_DESIRED_COUNT}" \
            '{
              project_name: $project_name,
              environment: $environment,
              managed_by: $managed_by,
              aws_region: $aws_region,
              vpc_cidr: $vpc_cidr,
              frontend_image_tag: $frontend_image_tag,
              backend_image_tag: $backend_image_tag,
              worker_image_tag: $worker_image_tag,
              gemini_model: $gemini_model,
              sonar_host_url: $sonar_host_url,
              sonar_organization: $sonar_organization,
              sonar_project_key: $sonar_project_key,
              frontend_desired_count: $frontend_desired_count,
              backend_desired_count: $backend_desired_count,
              worker_desired_count: $worker_desired_count
            }
            + (if $alarm_email != "" then {alarm_email: $alarm_email} else {} end)
            + (if $acm_certificate_arn != "" then {acm_certificate_arn: $acm_certificate_arn} else {} end)' \
            > ci.auto.tfvars.json

      - name: Plan service rollout
        if: steps.context.outputs.deployment_mode == 'service' && steps.rollout_plan.outputs.service_rollout_required == 'true'
        working-directory: secureflow_dashboard_infra
        env:
          TARGET_ARGS: ${{ steps.rollout_plan.outputs.target_args }}
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/scripts/ci/terraform_with_lock_recovery.sh" "${ARTIFACT_DIR}/service-plan.log" \
            terraform plan -no-color ${TARGET_ARGS} -out=tfplan-service
          terraform show -no-color tfplan-service > "${ARTIFACT_DIR}/service-plan.txt"

      - name: Apply service rollout
        id: service_apply
        if: steps.context.outputs.deployment_mode == 'service' && steps.rollout_plan.outputs.service_rollout_required == 'true'
        working-directory: secureflow_dashboard_infra
        continue-on-error: true
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/scripts/ci/terraform_with_lock_recovery.sh" "${ARTIFACT_DIR}/service-apply.log" \
            terraform apply -no-color -auto-approve tfplan-service

      - name: Collect deployment outputs
        id: deploy_outputs
        if: steps.context.outputs.deployment_mode != 'service' || steps.service_apply.outcome != 'failure'
        working-directory: secureflow_dashboard_infra
        run: |
          set -euo pipefail
          terraform output -json > outputs.json
          echo "alb_dns_name=$(jq -r '.alb_dns_name.value' outputs.json)" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$(jq -r '.frontend_url.value' outputs.json)" >> "$GITHUB_OUTPUT"
          echo "backend_api_url=$(jq -r '.backend_api_url.value' outputs.json)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_enabled=$(jq -r '.cloudfront_enabled.value' outputs.json)" >> "$GITHUB_OUTPUT"
          echo "waf_enabled=$(jq -r '.waf_enabled.value' outputs.json)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster_name=$(jq -r '.ecs_cluster_name.value' outputs.json)" >> "$GITHUB_OUTPUT"
          echo "frontend_service_name=$(jq -r '.frontend_service_name.value' outputs.json)" >> "$GITHUB_OUTPUT"
          echo "backend_service_name=$(jq -r '.backend_service_name.value' outputs.json)" >> "$GITHUB_OUTPUT"
          echo "worker_service_name=$(jq -r '.worker_service_name.value' outputs.json)" >> "$GITHUB_OUTPUT"

      - name: Describe ECS services
        if: steps.context.outputs.deployment_mode == 'service' && steps.service_apply.outcome != 'failure'
        env:
          ECS_CLUSTER_NAME: ${{ steps.service_targets.outputs.ecs_cluster_name }}
          FRONTEND_SERVICE_NAME: ${{ steps.service_targets.outputs.frontend_service_name }}
          BACKEND_SERVICE_NAME: ${{ steps.service_targets.outputs.backend_service_name }}
          WORKER_SERVICE_NAME: ${{ steps.service_targets.outputs.worker_service_name }}
        run: |
          set -euo pipefail
          aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${FRONTEND_SERVICE_NAME}" "${BACKEND_SERVICE_NAME}" "${WORKER_SERVICE_NAME}" \
            > "${ARTIFACT_DIR}/ecs-services.json"

      - name: Wait for ECS services to stabilize
        if: steps.context.outputs.deployment_mode == 'service' && steps.service_apply.outcome != 'failure'
        env:
          ECS_CLUSTER_NAME: ${{ steps.service_targets.outputs.ecs_cluster_name }}
          FRONTEND_SERVICE_NAME: ${{ steps.service_targets.outputs.frontend_service_name }}
          BACKEND_SERVICE_NAME: ${{ steps.service_targets.outputs.backend_service_name }}
          WORKER_SERVICE_NAME: ${{ steps.service_targets.outputs.worker_service_name }}
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${FRONTEND_SERVICE_NAME}" "${BACKEND_SERVICE_NAME}" "${WORKER_SERVICE_NAME}"

          aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${FRONTEND_SERVICE_NAME}" "${BACKEND_SERVICE_NAME}" "${WORKER_SERVICE_NAME}" \
            > "${ARTIFACT_DIR}/ecs-services-stable.json"

      - name: Wait for ALB target groups to become healthy
        if: steps.context.outputs.deployment_mode == 'service' && steps.service_apply.outcome != 'failure'
        env:
          FRONTEND_SERVICE_NAME: ${{ steps.service_targets.outputs.frontend_service_name }}
          BACKEND_SERVICE_NAME: ${{ steps.service_targets.outputs.backend_service_name }}
        run: |
          set -euo pipefail

          wait_for_target_group() {
            local service_name="$1"
            local output_file="$2"
            local target_group_arn
            local desired_count
            local attempt

            target_group_arn="$(jq -r --arg service_name "${service_name}" '.services[] | select(.serviceName == $service_name) | .loadBalancers[0].targetGroupArn // empty' "${ARTIFACT_DIR}/ecs-services-stable.json")"
            desired_count="$(jq -r --arg service_name "${service_name}" '.services[] | select(.serviceName == $service_name) | .desiredCount' "${ARTIFACT_DIR}/ecs-services-stable.json")"

            if [ -z "${target_group_arn}" ]; then
              echo "No target group found for ECS service ${service_name}" | tee -a "${ARTIFACT_DIR}/target-health.log"
              exit 1
            fi

            for attempt in $(seq 1 20); do
              aws elbv2 describe-target-health \
                --target-group-arn "${target_group_arn}" \
                > "${output_file}"

              healthy_count="$(jq '[.TargetHealthDescriptions[] | select(.TargetHealth.State == "healthy")] | length' "${output_file}")"

              if [ "${healthy_count}" -ge "${desired_count}" ] && [ "${desired_count}" -gt 0 ]; then
                echo "Target group healthy for ${service_name} on attempt ${attempt} (${healthy_count}/${desired_count})" | tee -a "${ARTIFACT_DIR}/target-health.log"
                return 0
              fi

              echo "Target group not healthy yet for ${service_name} on attempt ${attempt} (${healthy_count}/${desired_count})" | tee -a "${ARTIFACT_DIR}/target-health.log"
              sleep 15
            done

            echo "Target group failed to become healthy for ${service_name}" | tee -a "${ARTIFACT_DIR}/target-health.log"
            exit 1
          }

          wait_for_target_group "${FRONTEND_SERVICE_NAME}" "${ARTIFACT_DIR}/frontend-target-health.json"
          wait_for_target_group "${BACKEND_SERVICE_NAME}" "${ARTIFACT_DIR}/backend-target-health.json"

      - name: Smoke check public endpoints
        if: steps.context.outputs.deployment_mode == 'service' && steps.service_apply.outcome != 'failure'
        env:
          FRONTEND_URL: ${{ steps.deploy_outputs.outputs.frontend_url }}
          CLOUDFRONT_ENABLED: ${{ steps.deploy_outputs.outputs.cloudfront_enabled }}
          WAF_ENABLED: ${{ steps.deploy_outputs.outputs.waf_enabled }}
        run: |
          set -euo pipefail

          for path in / /health; do
            success=0
            waf_blocked=0
            for attempt in $(seq 1 20); do
              http_code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 \
                -H 'Accept: text/html,application/json' \
                -A 'Mozilla/5.0 (compatible; SecureFlowDeploySmokeCheck/1.0; +https://github.com/actions/runner)' \
                "${FRONTEND_URL}${path}" || true)"
              if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 400 ]; then
                echo "Smoke check passed for ${FRONTEND_URL}${path} on attempt ${attempt} (HTTP ${http_code})" | tee -a "${ARTIFACT_DIR}/smoke-check.log"
                success=1
                break
              fi

              if [ "${http_code}" = "403" ] && [ "${CLOUDFRONT_ENABLED}" = "true" ] && [ "${WAF_ENABLED}" = "true" ]; then
                echo "Smoke check received HTTP 403 for ${FRONTEND_URL}${path} on attempt ${attempt}. CloudFront + WAF is enabled, so the GitHub runner may be blocked even though ECS and ALB health checks are passing." | tee -a "${ARTIFACT_DIR}/smoke-check.log"
                waf_blocked=1
                break
              fi

              echo "Smoke check retry ${attempt} for ${FRONTEND_URL}${path} (HTTP ${http_code})" | tee -a "${ARTIFACT_DIR}/smoke-check.log"
              sleep 15
            done

            if [ "${success}" -ne 1 ] && [ "${waf_blocked}" -eq 1 ]; then
              echo "Smoke check skipped for ${FRONTEND_URL}${path} because CloudFront WAF returned HTTP 403 to the GitHub runner." | tee -a "${ARTIFACT_DIR}/smoke-check.log"
              {
                echo "## Smoke check skipped"
                echo ""
                echo "- URL: \`${FRONTEND_URL}${path}\`"
                echo "- Reason: CloudFront WAF returned HTTP 403 to the GitHub runner."
                echo "- ECS services and ALB target groups were healthy, so the deployment was not treated as failed."
              } >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            if [ "${success}" -ne 1 ]; then
              echo "Smoke check failed for ${FRONTEND_URL}${path}" | tee -a "${ARTIFACT_DIR}/smoke-check.log"
              exit 1
            fi
          done

      - name: Capture ECS diagnostics after service rollout failure
        if: steps.context.outputs.deployment_mode == 'service' && steps.service_apply.outcome == 'failure'
        env:
          ECS_CLUSTER_NAME: ${{ steps.service_targets.outputs.ecs_cluster_name }}
          FRONTEND_SERVICE_NAME: ${{ steps.service_targets.outputs.frontend_service_name }}
          BACKEND_SERVICE_NAME: ${{ steps.service_targets.outputs.backend_service_name }}
          WORKER_SERVICE_NAME: ${{ steps.service_targets.outputs.worker_service_name }}
        run: |
          set -euo pipefail

          aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${FRONTEND_SERVICE_NAME}" "${BACKEND_SERVICE_NAME}" "${WORKER_SERVICE_NAME}" \
            > "${ARTIFACT_DIR}/ecs-service-diagnostics.json" || true

          jq '{services: [.services[] | {serviceName, status, desiredCount, runningCount, pendingCount, events: (.events // [])[:10]}]}' \
            "${ARTIFACT_DIR}/ecs-service-diagnostics.json" \
            > "${ARTIFACT_DIR}/ecs-service-events-summary.json" || true

          capture_tasks() {
            local service_name="$1"
            local prefix="$2"
            local running_tasks
            local stopped_tasks

            running_tasks="$(aws ecs list-tasks --cluster "${ECS_CLUSTER_NAME}" --service-name "${service_name}" --desired-status RUNNING --query 'taskArns' --output text 2>/dev/null || true)"
            stopped_tasks="$(aws ecs list-tasks --cluster "${ECS_CLUSTER_NAME}" --service-name "${service_name}" --desired-status STOPPED --query 'taskArns' --output text 2>/dev/null || true)"

            if [ -n "${running_tasks}" ] && [ "${running_tasks}" != "None" ]; then
              aws ecs describe-tasks \
                --cluster "${ECS_CLUSTER_NAME}" \
                --tasks ${running_tasks} \
                > "${ARTIFACT_DIR}/${prefix}-running-tasks.json" || true
            fi

            if [ -n "${stopped_tasks}" ] && [ "${stopped_tasks}" != "None" ]; then
              aws ecs describe-tasks \
                --cluster "${ECS_CLUSTER_NAME}" \
                --tasks ${stopped_tasks} \
                > "${ARTIFACT_DIR}/${prefix}-stopped-tasks.json" || true
            fi
          }

          capture_target_group_health() {
            local service_name="$1"
            local prefix="$2"
            local target_group_arn

            target_group_arn="$(jq -r --arg service_name "${service_name}" '.services[] | select(.serviceName == $service_name) | .loadBalancers[0].targetGroupArn // empty' "${ARTIFACT_DIR}/ecs-service-diagnostics.json")"

            if [ -n "${target_group_arn}" ]; then
              aws elbv2 describe-target-health \
                --target-group-arn "${target_group_arn}" \
                > "${ARTIFACT_DIR}/${prefix}-target-health-on-failure.json" || true
            fi
          }

          capture_tasks "${FRONTEND_SERVICE_NAME}" "frontend"
          capture_tasks "${BACKEND_SERVICE_NAME}" "backend"
          capture_tasks "${WORKER_SERVICE_NAME}" "worker"
          capture_target_group_health "${FRONTEND_SERVICE_NAME}" "frontend"
          capture_target_group_health "${BACKEND_SERVICE_NAME}" "backend"

      - name: Fail after collecting service rollout diagnostics
        if: steps.context.outputs.deployment_mode == 'service' && steps.service_apply.outcome == 'failure'
        run: |
          echo "Terraform service rollout failed. See uploaded diagnostics artifacts."
          exit 1

      - name: Upload terraform artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secureflow-dashboard-terraform-${{ github.run_id }}
          path: artifacts/terraform/
          if-no-files-found: warn

      - name: Summarize failure diagnostics
        if: failure()
        run: |
          {
            echo "## Deployment failed"
            echo ""
            echo "Check the failed step in the Actions log first."
            echo ""
            echo "Uploaded artifact:"
            echo "- \`secureflow-dashboard-terraform-${{ github.run_id }}\`"
            echo ""
            echo "Useful files inside the artifact:"
            echo "- \`bootstrap-state-check.log\`"
            echo "- \`bootstrap-init.log\`"
            echo "- \`bootstrap-import.log\`"
            echo "- \`bootstrap-apply.log\`"
            echo "- \`dashboard-init.log\`"
            echo "- \`dashboard-validate.log\`"
            echo "- \`dashboard-waf-plan.log\`"
            echo "- \`dashboard-waf-plan.txt\`"
            echo "- \`dashboard-waf-apply.log\`"
            echo "- \`dashboard-plan.log\`"
            echo "- \`dashboard-plan.txt\`"
            echo "- \`dashboard-apply.log\`"
            echo "- \`docker-backend-build.log\`"
            echo "- \`docker-worker-build.log\`"
            echo "- \`docker-frontend-build.log\`"
            echo "- \`service-plan.log\`"
            echo "- \`service-plan.txt\`"
            echo "- \`service-apply.log\`"
            echo "- \`ecs-services.json\`"
            echo "- \`ecs-services-stable.json\`"
            echo "- \`ecs-service-diagnostics.json\`"
            echo "- \`frontend-running-tasks.json\`"
            echo "- \`frontend-stopped-tasks.json\`"
            echo "- \`backend-running-tasks.json\`"
            echo "- \`backend-stopped-tasks.json\`"
            echo "- \`worker-running-tasks.json\`"
            echo "- \`worker-stopped-tasks.json\`"
            echo "- \`target-health.log\`"
            echo "- \`frontend-target-health.json\`"
            echo "- \`backend-target-health.json\`"
            echo "- \`smoke-check.log\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize deployment
        run: |
          {
            echo "## SecureFlow Dashboard deployment"
            echo ""
            echo "- Environment: \`${{ steps.context.outputs.deploy_environment }}\`"
            echo "- Deployment mode: \`${{ steps.context.outputs.deployment_mode }}\`"
            echo "- Terraform state bucket: \`${{ steps.backend.outputs.state_bucket }}\`"
            echo "- Terraform lock table: \`${{ steps.backend.outputs.lock_table }}\`"
            echo "- ECS cluster: \`${{ steps.deploy_outputs.outputs.ecs_cluster_name }}\`"
            echo "- ALB DNS: \`${{ steps.deploy_outputs.outputs.alb_dns_name }}\`"
            echo "- Frontend URL: \`${{ steps.deploy_outputs.outputs.frontend_url }}\`"
            echo "- Backend URL: \`${{ steps.deploy_outputs.outputs.backend_api_url }}\`"
            echo ""
            if [ "${{ steps.context.outputs.deployment_mode }}" = "service" ]; then
              echo "- Image tag: \`${{ steps.context.outputs.image_tag }}\`"
              echo "- Frontend service: \`${{ steps.deploy_outputs.outputs.frontend_service_name }}\`"
              echo "- Backend service: \`${{ steps.deploy_outputs.outputs.backend_service_name }}\`"
              echo "- Worker service: \`${{ steps.deploy_outputs.outputs.worker_service_name }}\`"
              echo ""
              echo "The current project folders were built and deployed as ECS services."
            elif [ "${{ steps.context.outputs.deployment_mode }}" = "waf_only" ]; then
              echo "Only the WAF-related Terraform resources were targeted in this run."
              echo "Frontend, backend, and worker container images were not rebuilt or redeployed."
            else
              echo "This workflow only provisions AWS infrastructure."
              echo "Frontend, backend, and worker desired counts are forced to \`0\`, so no application containers are deployed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
