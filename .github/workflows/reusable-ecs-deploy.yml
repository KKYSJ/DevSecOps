name: Reusable ECS Deploy

on:
  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
      aws_role_to_assume:
        required: true
        type: string
      ecr_repository:
        required: true
        type: string
      ecs_cluster:
        required: true
        type: string
      ecs_service:
        required: true
        type: string
      ecs_task_family:
        required: true
        type: string
      ecs_container_name:
        required: true
        type: string
      build_context:
        required: true
        type: string
      git_ref:
        required: false
        default: ""
        type: string
      concurrency_suffix:
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ inputs.concurrency_suffix != '' && format('deploy-{0}-{1}', inputs.ecs_service, inputs.concurrency_suffix) || format('deploy-{0}', inputs.ecs_service) }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.sha }}

      - name: Check GitHub OIDC configuration
        run: |
          if [ -z "${{ inputs.aws_role_to_assume }}" ]; then
            echo "Set repository variable AWS_ROLE_TO_ASSUME before running CD."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_role_to_assume }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          IMAGE_TAG="${SHORT_SHA}-${GITHUB_RUN_ATTEMPT}"
          IMAGE_URI="${REGISTRY}/${{ inputs.ecr_repository }}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" "${{ inputs.build_context }}"
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Fetch current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ inputs.ecs_task_family }}" \
            --query taskDefinition > task-definition.json
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            task-definition.json > task-definition-clean.json

      - name: Render new ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-clean.json
          container-name: ${{ inputs.ecs_container_name }}
          image: ${{ steps.build-image.outputs.image_uri }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          cluster: ${{ inputs.ecs_cluster }}
          service: ${{ inputs.ecs_service }}
          wait-for-service-stability: true