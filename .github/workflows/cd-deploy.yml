name: CD Deploy

on:
  push:
    branches:
      - SUN
    paths:
      - ".github/workflows/cd-deploy.yml"
      - ".github/workflows/secureflow-dashboard-deploy.yml"
      - "backend/**"
      - "frontend/**"
      - "infra/docker/**"
      - "secureflow_dashboard_infra/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      deployment_mode:
        description: "Deployment mode"
        required: true
        default: "service"
        type: choice
        options:
          - service
          - infra_only

permissions:
  contents: read
  id-token: write

jobs:
  deploy-on-push:
    if: github.event_name == 'push'
    uses: ./.github/workflows/secureflow-dashboard-deploy.yml
    with:
      environment: dev
      deployment_mode: service
    secrets: inherit

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/secureflow-dashboard-deploy.yml
    with:
      environment: ${{ inputs.environment }}
      deployment_mode: ${{ inputs.deployment_mode }}
    secrets: inherit
