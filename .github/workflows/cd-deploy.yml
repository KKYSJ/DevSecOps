name: CD Deploy

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/cd-deploy.yml"
      - "app/api-server-fastapi/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: fastapi-dev-deploy
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: api-server-fastapi
  ECS_CLUSTER: secureflow-dev-cluster
  ECS_SERVICE: secureflow-dev-api-server-fastapi
  ECS_TASK_FAMILY: secureflow-dev-api-server-fastapi
  ECS_CONTAINER_NAME: api-server-fastapi

jobs:
  deploy-fastapi:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Check GitHub OIDC configuration
        run: |
          if [ -z "${{ vars.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "Set repository variable AWS_ROLE_TO_ASSUME before running CD."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push FastAPI image
        id: build-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" app/api-server-fastapi
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Fetch current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_FAMILY}" \
            --query taskDefinition > task-definition.json
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            task-definition.json > task-definition-clean.json

      - name: Render new ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-clean.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image_uri }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true
