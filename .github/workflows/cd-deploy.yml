name: CD Deploy

on:
  push:
    branches:
      - SUN
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  deploy-on-push:
    if: github.event_name == 'push'
    uses: ./.github/workflows/secureflow-dashboard-deploy.yml
    with:
      environment: dev
    secrets: inherit

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/secureflow-dashboard-deploy.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit
