name: CD Deploy

on:
  push:
    branches: ["SEO"]
    paths:
      - ".github/workflows/cd-deploy.yml"
      - ".github/workflows/reusable-ecs-deploy.yml"
      - "app/api-server-fastapi/**"
      - "app/api-server-node/**"
      - "app/api-server-spring/**"
      - "app/frontend/**"
  workflow_dispatch:
    inputs:
      service:
        description: "Select which service to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - fastapi
          - node
          - spring
          - frontend

permissions:
  contents: read
  id-token: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      fastapi: ${{ steps.filter.outputs.fastapi }}
      node: ${{ steps.filter.outputs.node }}
      spring: ${{ steps.filter.outputs.spring }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            fastapi:
              - ".github/workflows/cd-deploy.yml"
              - ".github/workflows/reusable-ecs-deploy.yml"
              - "app/api-server-fastapi/**"
            node:
              - ".github/workflows/cd-deploy.yml"
              - ".github/workflows/reusable-ecs-deploy.yml"
              - "app/api-server-node/**"
            spring:
              - ".github/workflows/cd-deploy.yml"
              - ".github/workflows/reusable-ecs-deploy.yml"
              - "app/api-server-spring/**"
            frontend:
              - ".github/workflows/cd-deploy.yml"
              - ".github/workflows/reusable-ecs-deploy.yml"
              - "app/frontend/**"

  deploy-fastapi:
    needs: detect-changes
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.fastapi == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'fastapi'))
    uses: ./.github/workflows/reusable-ecs-deploy.yml
    with:
      aws_region: ap-northeast-2
      aws_role_to_assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
      ecr_repository: api-server-fastapi
      ecs_cluster: secureflow-dev-cluster
      ecs_service: secureflow-dev-api-server-fastapi
      ecs_task_family: secureflow-dev-api-server-fastapi
      ecs_container_name: api-server-fastapi
      build_context: app/api-server-fastapi

  deploy-node:
    needs: detect-changes
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.node == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'node'))
    uses: ./.github/workflows/reusable-ecs-deploy.yml
    with:
      aws_region: ap-northeast-2
      aws_role_to_assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
      ecr_repository: api-server-node
      ecs_cluster: secureflow-dev-cluster
      ecs_service: secureflow-dev-api-server-node
      ecs_task_family: secureflow-dev-api-server-node
      ecs_container_name: api-server-node
      build_context: app/api-server-node

  deploy-spring:
    needs: detect-changes
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.spring == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'spring'))
    uses: ./.github/workflows/reusable-ecs-deploy.yml
    with:
      aws_region: ap-northeast-2
      aws_role_to_assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
      ecr_repository: api-server-spring
      ecs_cluster: secureflow-dev-cluster
      ecs_service: secureflow-dev-api-server-spring
      ecs_task_family: secureflow-dev-api-server-spring
      ecs_container_name: api-server-spring
      build_context: app/api-server-spring

  deploy-frontend:
    needs: detect-changes
    if: |
      (github.event_name == 'push' && needs.detect-changes.outputs.frontend == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'frontend'))
    uses: ./.github/workflows/reusable-ecs-deploy.yml
    with:
      aws_region: ap-northeast-2
      aws_role_to_assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
      ecr_repository: frontend
      ecs_cluster: secureflow-dev-cluster
      ecs_service: secureflow-dev-frontend
      ecs_task_family: secureflow-dev-frontend
      ecs_container_name: frontend
      build_context: app/frontend
