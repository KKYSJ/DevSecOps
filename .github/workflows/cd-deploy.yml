    uses: ./.github/workflows/reusable-ecs-deploy.yml
    with:
      aws_region: ap-northeast-2
      aws_role_to_assume: ${{ vars.AWS_ROLE_TO_ASSUME_PROD || vars.AWS_ROLE_TO_ASSUME }}
      ecr_repository: api-server-node
      ecs_cluster: secureflow-prod-cluster
      ecs_service: secureflow-prod-api-server-node
      ecs_task_family: secureflow-prod-api-server-node
      ecs_container_name: api-server-node
      build_context: app/api-server-node
      git_ref: ${{ needs.resolve-context.outputs.source_sha }}
      concurrency_suffix: production-${{ needs.resolve-context.outputs.branch_name }}

  deploy-production-spring:
    needs:
      - resolve-context
      - isms-preprod-gate
    if: |
      always() &&
      needs.isms-preprod-gate.result == 'success' &&
      needs.resolve-context.outputs.run_production == 'true' &&
      (needs.resolve-context.outputs.service == 'all' || needs.resolve-context.outputs.service == 'spring')
    uses: ./.github/workflows/reusable-ecs-deploy.yml
    with:
      aws_region: ap-northeast-2
      aws_role_to_assume: ${{ vars.AWS_ROLE_TO_ASSUME_PROD || vars.AWS_ROLE_TO_ASSUME }}
      ecr_repository: api-server-spring
      ecs_cluster: secureflow-prod-cluster
      ecs_service: secureflow-prod-api-server-spring
      ecs_task_family: secureflow-prod-api-server-spring
      ecs_container_name: api-server-spring
      build_context: app/api-server-spring
      git_ref: ${{ needs.resolve-context.outputs.source_sha }}
      concurrency_suffix: production-${{ needs.resolve-context.outputs.branch_name }}

  deploy-production-frontend:
    needs:
      - resolve-context
      - isms-preprod-gate
    if: |
      always() &&
      needs.isms-preprod-gate.result == 'success' &&
      needs.resolve-context.outputs.run_production == 'true' &&
      (needs.resolve-context.outputs.service == 'all' || needs.resolve-context.outputs.service == 'frontend')
    uses: ./.github/workflows/reusable-ecs-deploy.yml
    with:
      aws_region: ap-northeast-2
      aws_role_to_assume: ${{ vars.AWS_ROLE_TO_ASSUME_PROD || vars.AWS_ROLE_TO_ASSUME }}
      ecr_repository: frontend
      ecs_cluster: secureflow-prod-cluster
      ecs_service: secureflow-prod-frontend
      ecs_task_family: secureflow-prod-frontend
      ecs_container_name: frontend
      build_context: app/frontend
      git_ref: ${{ needs.resolve-context.outputs.source_sha }}
      concurrency_suffix: production-${{ needs.resolve-context.outputs.branch_name }}

  # 전체 stage 종합 판정 (CI+CD 모든 gate 수집 → Gemini 종합 분석)
  overall-verdict:
    needs:
      - resolve-context
      - llm-image-gate
      - llm-dast-gate
    if: always() && needs.resolve-context.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: ${{ secrets.BACKEND_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      COMMIT_SHA: ${{ needs.resolve-context.outputs.source_sha }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q httpx 2>/dev/null

      - name: Download all gate artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*gate*"
          merge-multiple: false

      - name: Collect gate files and generate overall verdict
        run: |
          mkdir -p scan-results/iac-llm-gate scan-results/sast-llm-gate scan-results/sca-llm-gate scan-results/image-llm-gate scan-results/dast-llm-gate

          for stage in iac sast sca image dast; do
            SRC=$(find artifacts -name "${stage}-llm-gate.json" 2>/dev/null | head -1)
            if [ -n "$SRC" ]; then
              cp "$SRC" "scan-results/${stage}-llm-gate/${stage}-llm-gate.json"
              echo "Found ${stage} gate: $SRC"
            else
              echo "Missing ${stage} gate"
            fi
          done

          echo "=== Collected gate files ==="
          find scan-results -name "*.json" -type f

          python3 -c "
          import json, os, sys, re
          sys.path.insert(0, '.')

          stages = ['iac', 'sast', 'sca', 'image', 'dast']
          stage_details = []

          for stage in stages:
              path = f'scan-results/{stage}-llm-gate/{stage}-llm-gate.json'
              if not os.path.exists(path):
                  continue
              gate = json.load(open(path))
              decision = gate.get('decision', 'unknown')
              matching = gate.get('matching', {})
              matched = len(matching.get('matched_pairs_sample', []))
              unmatched = len(gate.get('unmatched_findings', []))
              summary = gate.get('llm_analysis', {}).get('summary', '')
              stage_details.append(
                  f'[{stage.upper()}] gate={decision}, 동시탐지={matched}건, 단독탐지={unmatched}건'
                  + f'\n  요약: {summary[:150]}'
              )

          if not stage_details:
              print('No gate files found, skipping verdict')
              sys.exit(0)

          print(f'종합 판정 대상: {len(stage_details)}개 stage')

          prompt = '''너는 DevSecOps 보안 파이프라인의 최종 판정을 내리는 전문가다.
          아래는 각 보안 검사 단계의 분석 결과이다. 이를 종합하여 최종 판정을 한국어로 작성하라.

          ''' + chr(10).join(stage_details) + '''

          게이트 차단 조건:
          - CRITICAL TRUE_POSITIVE >= 1건
          - total_score >= 100
          - HIGH TRUE_POSITIVE >= 3건

          다음을 포함하여 작성하라:
          1. 어떤 단계에서 어떤 이유로 차단(또는 통과)되었는지
          2. 가장 심각한 취약점이 무엇이고 왜 위험한지
          3. 즉시 조치가 필요한 항목과 우선순위
          4. 전체적인 보안 상태 평가

          아래 JSON 형식으로만 응답하라:
          {\"verdict\": \"5~8문장의 상세한 종합 판정 (한국어)\", \"priority_actions\": [\"우선 조치1\", \"우선 조치2\", \"우선 조치3\"]}
          '''

          from engine.llm.client import call_llm
          resp = call_llm(prompt)
          match = re.search(r'\{[\s\S]+\}', resp)
          if match:
              verdict_data = json.loads(match.group(0))
              print(f'종합 판정 생성 완료')
              print(f'  verdict: {verdict_data.get(\"verdict\", \"\")[:100]}...')
          else:
              verdict_data = {'verdict': '종합 판정 생성 실패', 'priority_actions': []}
              print('LLM 응답 파싱 실패')

          import urllib.request
          backend = os.environ.get('BACKEND_URL', '')
          commit = os.environ.get('COMMIT_SHA', '')
          payload = json.dumps({
              'stage': 'overall-verdict',
              'commit_hash': commit,
              'gate_result': {
                  'type': 'overall_verdict',
                  'summaries': {'_overall': verdict_data},
              },
          }).encode('utf-8')
          req = urllib.request.Request(
              f'{backend}/api/v1/scans/gate-result',
              data=payload,
              headers={'Content-Type': 'application/json'},
          )
          try:
              r = urllib.request.urlopen(req, timeout=30)
              print(f'EC2 전송 완료: {r.read().decode()}')
          except Exception as e:
              print(f'EC2 전송 실패: {e}')
          "
