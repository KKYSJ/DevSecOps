name: CD Deploy

on:
  push:
    branches: ["SEO"]
    paths:
      - ".github/workflows/cd-deploy.yml"
      - ".github/workflows/reusable-ecs-deploy.yml"
      - "app/api-server-fastapi/**"
      - "app/api-server-node/**"
      - "app/api-server-spring/**"
      - "app/frontend/**"
  workflow_dispatch:
    inputs:
      service:
        description: "Select which service to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - fastapi
          - node
          - spring
          - frontend

permissions:
  contents: read
  id-token: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      fastapi: ${{ steps.filter.outputs.fastapi }}
      node: ${{ steps.filter.outputs.node }}
      spring: ${{ steps.filter.outputs.spring }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4
      - run: echo "TODO: ECR push, ECS deploy, ZAP"
