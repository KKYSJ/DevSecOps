      run_production: false
    secrets: inherit

  chain-cd-main:
    needs:
      - ci-release-gate
    if: github.event_name == 'push' && github.ref_name == 'main'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/cd-deploy.yml
    with:
      branch_name: main
      source_sha: ${{ github.sha }}
      service: all
      run_staging: true
      run_production: true
    secrets: inherit

  chain-cd-sun:
