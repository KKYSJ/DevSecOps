name: CI Security Scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  fastapi-security-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/api-server-fastapi/requirements.txt

      - name: Install app and security dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/api-server-fastapi/requirements.txt
          pip install pytest httpx bandit pip-audit

      - name: Run FastAPI smoke tests
        env:
          PYTHONPATH: app/api-server-fastapi
        run: pytest app/api-server-fastapi/tests -q

      - name: Run Bandit SAST scan
        run: bandit -q -r app/api-server-fastapi -x app/api-server-fastapi/data,app/api-server-fastapi/tests
        continue-on-error: true

      - name: Audit Python dependencies
        run: pip-audit -r app/api-server-fastapi/requirements.txt
        continue-on-error: true

      - name: Build FastAPI container
        run: docker build -t secureflow-fastapi-ci app/api-server-fastapi

  node-security-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/api-server-node/package-lock.json

      - name: Install Node API dependencies
        working-directory: app/api-server-node
        run: npm ci

      - name: Check Node API syntax
        run: node --check app/api-server-node/src/app.js

      - name: Audit Node API dependencies
        working-directory: app/api-server-node
        run: npm audit --omit=dev --audit-level=critical
        continue-on-error: true

      - name: Build Node API container
        run: docker build -t secureflow-node-ci app/api-server-node

  spring-security-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Build Spring API package
        working-directory: app/api-server-spring
        run: |
          chmod +x mvnw
          ./mvnw -q -DskipTests package

      - name: Build Spring API container
        run: docker build -t secureflow-spring-ci app/api-server-spring

  frontend-security-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: app/frontend
        run: npm audit --omit=dev --audit-level=critical
        continue-on-error: true

      - name: Build frontend bundle
        working-directory: app/frontend
        run: npm run build

      - name: Build frontend container
        run: docker build -t secureflow-frontend-ci app/frontend

  iac-checkov:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Run Checkov
        run: |
          checkov -d infra/terraform --framework terraform -o json > checkov-results.json || true
          if [ ! -f checkov-results.json ]; then
            echo '{"results":{"failed_checks":[]}}' > checkov-results.json
          fi

      - name: Upload Checkov results
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: checkov-results.json

  iac-tfsec:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run tfsec
        run: |
          docker run --rm -v "${PWD}:/workspace" aquasec/tfsec:latest \
            /workspace/infra/terraform \
            --format json \
            --out /workspace/tfsec-results.json || true
          if [ ! -f tfsec-results.json ]; then
            echo '{"results":[]}' > tfsec-results.json
          fi

      - name: Upload tfsec results
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-results
          path: tfsec-results.json

  llm-iac-gate:
    needs:
      - iac-checkov
      - iac-tfsec
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download IaC artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/iac

      - name: Run IaC LLM gate
        env:
          LLM_GATE_ADVISORY_MODE: "true"
          LLM_GATE_REVIEW_BLOCKS: "false"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/ci/run_llm_gate.py \
            --stage iac \
            --tool-input checkov=artifacts/iac/checkov-results/checkov-results.json \
            --tool-input tfsec=artifacts/iac/tfsec-results/tfsec-results.json \
            --output artifacts/iac/iac-llm-gate.json

      - name: Upload IaC gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iac-llm-gate
          path: artifacts/iac/iac-llm-gate.json

  service-sast-semgrep:
    needs:
      - fastapi-security-ci
      - node-security-ci
      - spring-security-ci
      - frontend-security-ci
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Semgrep on service code
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
          semgrep --config security-tools/semgrep/.semgrep.yml --json --output semgrep-results.json app || true
          semgrep --config security-tools/semgrep/.semgrep.yml --sarif --output semgrep.sarif app || true
          if [ ! -f semgrep-results.json ]; then
            echo '{"results":[]}' > semgrep-results.json
          fi
          if [ ! -f semgrep.sarif ]; then
            echo '{"runs":[]}' > semgrep.sarif
          fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-service-results
          path: semgrep-results.json

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  service-sast-sonarqube:
    needs:
      - fastapi-security-ci
      - node-security-ci
      - spring-security-ci
      - frontend-security-ci
    if: always()
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check SonarQube configuration
        id: sonar-config
        run: |
          if [ -n "${SONAR_TOKEN}" ] && [ -n "${SONAR_HOST_URL}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SonarQube secrets are not configured. Skipping SonarQube scan on this run."
            echo '{"issues":[],"tool_disabled":true,"reason":"missing_sonarqube_configuration"}' > sonarqube-results.json
          fi

      - name: Set up JDK 17
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Spring project
        if: steps.sonar-config.outputs.enabled == 'true'
        run: |
          cd app/api-server-spring
          chmod +x mvnw
          ./mvnw compile -q -DskipTests || echo "Maven build failed, continuing without .class files"

      - name: SonarQube service scan
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.sources=app/api-server-fastapi,app/api-server-node,app/api-server-spring,app/frontend
            -Dsonar.python.version=3.11
            -Dsonar.java.binaries=app/api-server-spring/target/classes

      - name: Export SonarQube issues
        if: steps.sonar-config.outputs.enabled == 'true'
        run: |
          SONAR_URL="${SONAR_HOST_URL}/api/issues/search?componentKeys=${{ vars.SONAR_PROJECT_KEY }}&types=VULNERABILITY&resolved=false&ps=500"
          curl -s -u "${SONAR_TOKEN}:" "$SONAR_URL" -o sonarqube-results.json || echo '{"issues":[]}' > sonarqube-results.json

      - name: Upload SonarQube results
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: sonarqube-service-results
          path: sonarqube-results.json

  llm-sast-gate:
    needs:
      - service-sast-semgrep
      - service-sast-sonarqube
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download SAST artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/sast

      - name: Run SAST LLM gate
        env:
          LLM_GATE_ADVISORY_MODE: "true"
          LLM_GATE_REVIEW_BLOCKS: "false"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/ci/run_llm_gate.py \
            --stage sast \
            --tool-input semgrep=artifacts/sast/semgrep-service-results/semgrep-results.json \
            --tool-input sonarqube=artifacts/sast/sonarqube-service-results/sonarqube-results.json \
            --output artifacts/sast/sast-llm-gate.json

      - name: Upload SAST gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-llm-gate
          path: artifacts/sast/sast-llm-gate.json

  service-sca-depcheck:
    needs:
      - fastapi-security-ci
      - node-security-ci
      - spring-security-ci
      - frontend-security-ci
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install service dependencies for dependency scan
        run: |
          npm ci --prefix app/api-server-node
          npm ci --prefix app/frontend

      - name: Run OWASP Dependency-Check on services
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "secureflow-services"
          path: "app"
          format: "JSON"
          out: "depcheck-results"
          args: >
            --enableRetired
            --suppression security-tools/dependency-check/suppression.xml
        env:
          JAVA_HOME: /opt/jdk

      - name: Ensure Dependency-Check report exists
        run: |
          if [ ! -f depcheck-results/dependency-check-report.json ]; then
            mkdir -p depcheck-results
            echo '{"dependencies":[]}' > depcheck-results/dependency-check-report.json
          fi

      - name: Upload Dependency-Check results
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-service-results
          path: depcheck-results/

  service-sca-trivy:
    needs:
      - fastapi-security-ci
      - node-security-ci
      - spring-security-ci
      - frontend-security-ci
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan on services
        run: |
          docker run --rm -v "${PWD}:/workspace" aquasec/trivy:latest \
            fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --format json \
            --output /workspace/trivy-results.json \
            /workspace/app || true
          if [ ! -f trivy-results.json ]; then
            echo '{"Results":[]}' > trivy-results.json
          fi

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-service-results
          path: trivy-results.json

  llm-sca-gate:
    needs:
      - service-sca-depcheck
      - service-sca-trivy
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download SCA artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/sca

      - name: Run SCA LLM gate
        env:
          LLM_GATE_ADVISORY_MODE: "true"
          LLM_GATE_REVIEW_BLOCKS: "false"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/ci/run_llm_gate.py \
            --stage sca \
            --tool-input depcheck=artifacts/sca/depcheck-service-results/dependency-check-report.json \
            --tool-input trivy=artifacts/sca/trivy-service-results/trivy-results.json \
            --output artifacts/sca/sca-llm-gate.json

      - name: Upload SCA gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-llm-gate
          path: artifacts/sca/sca-llm-gate.json

  ci-release-gate:
    needs:
      - llm-iac-gate
      - llm-sast-gate
      - llm-sca-gate
    runs-on: ubuntu-latest

    steps:
      - name: Confirm CI gates passed
        run: echo "IaC, SAST, and SCA LLM gates passed for this revision."

  upload-to-secureflow:
    name: "SecureFlow 대시보드 업로드"
    needs:
      - service-sast-semgrep
      - service-sast-sonarqube
      - service-sca-trivy
      - service-sca-depcheck
      - iac-tfsec
      - iac-checkov
    if: always()
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: ${{ secrets.BACKEND_URL }}

    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: scan-results/
        continue-on-error: true

      - name: 수집된 결과 확인
        run: find scan-results/ -name "*.json" | sort || echo "결과 없음"

      - name: SecureFlow 백엔드에 결과 업로드
        if: env.BACKEND_URL != ''
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          upload() {
            local tool=$1 file=$2
            if [ -f "$file" ]; then
              echo "업로드: $tool"
              # 임시 payload 파일 생성 (큰 JSON도 처리 가능)
              jq -n --arg tool "$tool" \
                    --arg commit "${COMMIT_SHA}" \
                    --arg project "secureflow" \
                    --arg branch "${GITHUB_REF_NAME}" \
                    --slurpfile raw "$file" \
                    '{tool:$tool, raw_result:$raw[0], commit_hash:$commit, project_name:$project, branch:$branch}' \
                    > /tmp/payload.json 2>/dev/null
              if [ $? -eq 0 ]; then
                HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
                  -X POST "${BACKEND_URL}/api/v1/scans" \
                  -H "Content-Type: application/json" \
                  -d @/tmp/payload.json \
                  --max-time 60 || echo "000")
              else
                echo "  ⚠ jq 실패, 직접 전송 시도"
                HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
                  -X POST "${BACKEND_URL}/api/v1/scans" \
                  -H "Content-Type: application/json" \
                  -d "{\"tool\":\"${tool}\",\"raw_result\":$(cat "$file"),\"commit_hash\":\"${COMMIT_SHA}\",\"project_name\":\"secureflow\",\"branch\":\"${GITHUB_REF_NAME}\"}" \
                  --max-time 30 || echo "000")
              fi
              echo "  → HTTP $HTTP"
              rm -f /tmp/payload.json
            else
              echo "건너뜀: $tool (파일 없음)"
            fi
          }

          upload "semgrep"  "scan-results/semgrep-service-results/semgrep-results.json"
          upload "sonarqube" "scan-results/sonarqube-service-results/sonarqube-results.json"
          upload "trivy"    "scan-results/trivy-service-results/trivy-results.json"
          upload "depcheck" "scan-results/depcheck-service-results/dependency-check-report.json"
          upload "tfsec"    "scan-results/tfsec-results/tfsec-results.json"
          upload "checkov"  "scan-results/checkov-results/checkov-results.json"
        continue-on-error: true

      - name: Worker 파싱 완료 대기
        if: env.BACKEND_URL != ''
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "Worker 파싱 완료 대기 중..."
          for i in $(seq 1 30); do
            PENDING=$(curl -s "${BACKEND_URL}/api/v1/scans" | grep -o "\"commit_hash\":\"${COMMIT_SHA}\"[^}]*\"status\":\"received\"" | wc -l || echo "0")
            PROCESSING=$(curl -s "${BACKEND_URL}/api/v1/scans" | grep -o "\"commit_hash\":\"${COMMIT_SHA}\"[^}]*\"status\":\"processing\"" | wc -l || echo "0")
            WAIT=$((PENDING + PROCESSING))
            if [ "$WAIT" -eq 0 ]; then
              echo "✅ 모든 스캔 파싱 완료"
              break
            fi
            echo "  대기 중... (미완료: ${WAIT}건, ${i}/30)"
            sleep 5
          done

      - name: Phase 1 분석 실행 (교차검증 + 게이트 결정)
        if: env.BACKEND_URL != ''
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "Phase 1 분석 요청..."
          RESULT=$(curl -s -X POST "${BACKEND_URL}/api/v1/scans/analyze" \
            -H "Content-Type: application/json" \
            -d "{\"commit_hash\":\"${COMMIT_SHA}\",\"phase\":1}" \
            --max-time 120 || echo "{}")
          echo "$RESULT" | head -500
          GATE=$(echo "$RESULT" | grep -o '"gate_decision":"[^"]*"' | head -1 || echo "")
          echo "게이트 결정: $GATE"
        continue-on-error: true

      - name: BACKEND_URL 미설정 안내
        if: env.BACKEND_URL == ''
        run: |
          echo "⚠️ BACKEND_URL secret이 설정되지 않았습니다."
          echo "  SecureFlow 백엔드 배포 후 GitHub Secrets에 BACKEND_URL을 추가하면"
          echo "  스캔 결과가 대시보드에 자동 반영됩니다."

  chain-cd-nayoung:
    needs:
      - ci-release-gate
    if: github.event_name == 'push' && github.ref_name == 'nayoung'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/cd-deploy.yml
    with:
      branch_name: ${{ github.ref_name }}
      source_sha: ${{ github.sha }}
      service: all
      run_staging: true
      run_production: false
    secrets: inherit