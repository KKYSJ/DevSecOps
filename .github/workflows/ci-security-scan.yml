name: Current Branch Preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Detect unresolved merge markers in deploy paths
        run: |
          set -euo pipefail

          if rg -n "^(<<<<<<<|=======|>>>>>>>)" \
            .github/workflows \
            backend \
            frontend \
            infra/docker \
            scripts/ci \
            secureflow_dashboard_infra \
            -g '!backend/venv/**'; then
            echo "Unresolved merge markers were found in the current deploy paths."
            exit 1
          fi

      - name: Summarize
        run: |
          {
            echo "## Current branch preflight passed"
            echo ""
            echo "- No merge markers were found in the current deployment paths."
            echo "- Use the CD Deploy workflow to build and deploy frontend/backend/worker."
          } >> "$GITHUB_STEP_SUMMARY"
