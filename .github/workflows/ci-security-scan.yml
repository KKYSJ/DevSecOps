name: CI Security Scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  fastapi-security-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/api-server-fastapi/requirements.txt

      - name: Install app and security dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/api-server-fastapi/requirements.txt
          pip install pytest httpx bandit pip-audit

      - name: Run FastAPI smoke tests
        env:
          PYTHONPATH: app/api-server-fastapi
        run: pytest app/api-server-fastapi/tests -q

      - name: Run Bandit SAST scan
        run: bandit -q -r app/api-server-fastapi -x app/api-server-fastapi/data,app/api-server-fastapi/tests

      - name: Audit Python dependencies
        run: pip-audit -r app/api-server-fastapi/requirements.txt

      - name: Build FastAPI container
        run: docker build -t secureflow-fastapi-ci app/api-server-fastapi

  node-security-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/api-server-node/package-lock.json

      - name: Install Node API dependencies
        working-directory: app/api-server-node
        run: npm ci

      - name: Check Node API syntax
        run: node --check app/api-server-node/src/app.js

      - name: Audit Node API dependencies
        working-directory: app/api-server-node
        run: npm audit --omit=dev --audit-level=critical

      - name: Build Node API container
        run: docker build -t secureflow-node-ci app/api-server-node

  spring-security-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Build Spring API package
        working-directory: app/api-server-spring
        run: |
          chmod +x mvnw
          ./mvnw -q -DskipTests package

      - name: Build Spring API container
        run: docker build -t secureflow-spring-ci app/api-server-spring

  frontend-security-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: app/frontend
        run: npm audit --omit=dev --audit-level=critical

      - name: Build frontend bundle
        working-directory: app/frontend
        run: npm run build

      - name: Build frontend container
        run: docker build -t secureflow-frontend-ci app/frontend

  iac-checkov:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Run Checkov
        run: |
          checkov -d infra/terraform --framework terraform -o json > checkov-results.json || true
          if [ ! -f checkov-results.json ]; then
            echo '{"results":{"failed_checks":[]}}' > checkov-results.json
          fi

      - name: Upload Checkov results
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: checkov-results.json

  iac-tfsec:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run tfsec
        run: |
          rm -f tfsec-results.json
          rm -f tfsec.log
          container_id="$(docker create -v "${PWD}:/workspace" -w /workspace aquasec/tfsec:latest \
            ./infra/terraform \
            --format json \
            --out /tmp/tfsec-results.json \
            --soft-fail)"
          docker start -a "$container_id" > tfsec.log 2>&1 || true
          docker cp "$container_id:/tmp/tfsec-results.json" tfsec-results.json >/dev/null 2>&1 || true
          docker rm -f "$container_id" >/dev/null 2>&1 || true
          if [ ! -s tfsec-results.json ]; then
            echo '{"results":[],"tool_disabled":true,"reason":"tfsec_report_missing_or_empty"}' > tfsec-results.json
          fi

      - name: Upload tfsec results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfsec-results
          path: tfsec-results.json

      - name: Upload tfsec debug log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfsec-debug-log
          path: tfsec.log

  llm-iac-gate:
    needs:
      - iac-checkov
      - iac-tfsec
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download IaC artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/iac

      - name: Run IaC LLM gate
        env:
          LLM_GATE_ADVISORY_MODE: "true"
          LLM_GATE_REVIEW_BLOCKS: "false"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/ci/run_llm_gate.py \
            --stage iac \
            --tool-input checkov=artifacts/iac/checkov-results/checkov-results.json \
            --tool-input tfsec=artifacts/iac/tfsec-results/tfsec-results.json \
            --output artifacts/iac/iac-llm-gate.json

      - name: Upload IaC gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iac-llm-gate
          path: artifacts/iac/iac-llm-gate.json

  service-sast-semgrep:
    needs:
      - fastapi-security-ci
      - node-security-ci
      - spring-security-ci
      - frontend-security-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Semgrep on service code
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
          semgrep \
            --config p/default \
            --config p/security-audit \
            --json \
            --output semgrep-results.json \
            app || true
          semgrep \
            --config p/default \
            --config p/security-audit \
            --sarif \
            --output semgrep.sarif \
            app || true
          if [ ! -s semgrep-results.json ]; then
            echo '{"results":[],"tool_disabled":true,"reason":"semgrep_report_missing_or_empty"}' > semgrep-results.json
          fi
          if [ ! -f semgrep.sarif ]; then
            echo '{"runs":[]}' > semgrep.sarif
          fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-service-results
          path: semgrep-results.json

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  service-sast-sonarqube:
    needs:
      - fastapi-security-ci
      - node-security-ci
      - spring-security-ci
      - frontend-security-ci
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN || vars.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || vars.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION || vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY || vars.SONAR_PROJECT_KEY }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check SonarQube configuration
        id: sonar-config
        run: |
          if [ -n "${SONAR_TOKEN}" ] && [ -n "${SONAR_HOST_URL}" ] && [ -n "${SONAR_ORGANIZATION}" ] && [ -n "${SONAR_PROJECT_KEY}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            missing_parts=()
            if [ -z "${SONAR_TOKEN}" ]; then
              missing_parts+=("SONAR_TOKEN")
            fi
            if [ -z "${SONAR_HOST_URL}" ]; then
              missing_parts+=("SONAR_HOST_URL")
            fi
            if [ -z "${SONAR_ORGANIZATION}" ]; then
              missing_parts+=("SONAR_ORGANIZATION")
            fi
            if [ -z "${SONAR_PROJECT_KEY}" ]; then
              missing_parts+=("SONAR_PROJECT_KEY")
            fi
            missing_summary="$(IFS=,; echo "${missing_parts[*]}")"
            echo "SonarQube configuration is incomplete. Missing: ${missing_summary}"
            echo "{\"issues\":[],\"tool_disabled\":true,\"reason\":\"missing_sonarqube_configuration\",\"missing\":\"${missing_summary}\"}" > sonarqube-results.json
          fi

      - name: Set up Java for SonarQube Java analysis
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Build Spring classes for SonarQube
        if: steps.sonar-config.outputs.enabled == 'true'
        working-directory: app/api-server-spring
        run: |
          chmod +x mvnw
          ./mvnw -q -DskipTests package

      - name: SonarQube service scan
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=app/api-server-fastapi,app/api-server-node,app/api-server-spring,app/frontend
            -Dsonar.java.binaries=app/api-server-spring/target/classes
            -Dsonar.python.version=3.11

      - name: Export SonarQube issues
        if: steps.sonar-config.outputs.enabled == 'true'
        run: |
          SONAR_URL="${SONAR_HOST_URL}/api/issues/search?componentKeys=${SONAR_PROJECT_KEY}&types=VULNERABILITY&resolved=false&ps=500"
          curl -s -u "${SONAR_TOKEN}:" "$SONAR_URL" -o sonarqube-results.json || echo '{"issues":[]}' > sonarqube-results.json

      - name: Upload SonarQube results
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: sonarqube-service-results
          path: sonarqube-results.json

  llm-sast-gate:
    needs:
      - service-sast-semgrep
      - service-sast-sonarqube
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download SAST artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/sast

      - name: Run SAST LLM gate
        env:
          LLM_GATE_ADVISORY_MODE: "true"
          LLM_GATE_REVIEW_BLOCKS: "false"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/ci/run_llm_gate.py \
            --stage sast \
            --tool-input semgrep=artifacts/sast/semgrep-service-results/semgrep-results.json \
            --tool-input sonarqube=artifacts/sast/sonarqube-service-results/sonarqube-results.json \
            --output artifacts/sast/sast-llm-gate.json

      - name: Upload SAST gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-llm-gate
          path: artifacts/sast/sast-llm-gate.json

  service-sca-depcheck:
    needs:
      - fastapi-security-ci
      - node-security-ci
      - spring-security-ci
      - frontend-security-ci
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install service dependencies for dependency scan
        run: |
          npm ci --prefix app/api-server-node
          npm ci --prefix app/frontend

      - name: Run OWASP Dependency-Check on services
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "secureflow-services"
          path: "app"
          format: "JSON"
          out: "depcheck-results"
          args: >
            --enableRetired
            --suppression security-tools/dependency-check/suppression.xml
        env:
          JAVA_HOME: /opt/jdk

      - name: Ensure Dependency-Check report exists
        run: |
          if [ ! -f depcheck-results/dependency-check-report.json ]; then
            mkdir -p depcheck-results
            echo '{"dependencies":[]}' > depcheck-results/dependency-check-report.json
          fi

      - name: Upload Dependency-Check results
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-service-results
          path: depcheck-results/

  service-sca-trivy:
    needs:
      - fastapi-security-ci
      - node-security-ci
      - spring-security-ci
      - frontend-security-ci
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan on services
        run: |
          docker run --rm -v "${PWD}:/workspace" aquasec/trivy:latest \
            fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --format json \
            --output /workspace/trivy-results.json \
            /workspace/app || true
          if [ ! -f trivy-results.json ]; then
            echo '{"Results":[]}' > trivy-results.json
          fi

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-service-results
          path: trivy-results.json

  llm-sca-gate:
    needs:
      - service-sca-depcheck
      - service-sca-trivy
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download SCA artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/sca

      - name: Run SCA LLM gate
        env:
          LLM_GATE_ADVISORY_MODE: "true"
          LLM_GATE_REVIEW_BLOCKS: "false"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/ci/run_llm_gate.py \
            --stage sca \
            --tool-input depcheck=artifacts/sca/depcheck-service-results/dependency-check-report.json \
            --tool-input trivy=artifacts/sca/trivy-service-results/trivy-results.json \
            --output artifacts/sca/sca-llm-gate.json

      - name: Upload SCA gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-llm-gate
          path: artifacts/sca/sca-llm-gate.json

  ci-release-gate:
    needs:
      - llm-iac-gate
      - llm-sast-gate
      - llm-sca-gate
    runs-on: ubuntu-latest

    steps:
      - name: Confirm CI gates passed
        run: echo "IaC, SAST, and SCA LLM gates passed for this revision."

  chain-cd-seo:
    needs:
      - ci-release-gate
    if: github.event_name == 'push' && github.ref_name == 'SEO'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/cd-deploy.yml
    with:
      branch_name: ${{ github.ref_name }}
      source_sha: ${{ github.sha }}
      service: all
      run_staging: true
      run_production: false
    secrets: inherit
