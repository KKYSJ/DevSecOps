name: CI Security Scan

on:
  push:
    paths:
      - ".github/workflows/ci-security-scan.yml"
      - "app/**"
      - "backend/**"
      - "frontend/**"
      - "engine/**"
      - "ismsp/**"
      - "infra/terraform/**"
      - "security-tools/**"
      - "scripts/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "Makefile"
  pull_request:
    paths:
      - ".github/workflows/ci-security-scan.yml"
      - "app/**"
      - "backend/**"
      - "frontend/**"
      - "engine/**"
      - "ismsp/**"
      - "infra/terraform/**"
      - "security-tools/**"
      - "scripts/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      fastapi: ${{ steps.manual.outputs.fastapi || steps.filter.outputs.fastapi }}
      node: ${{ steps.manual.outputs.node || steps.filter.outputs.node }}
      spring: ${{ steps.manual.outputs.spring || steps.filter.outputs.spring }}
      frontend_app: ${{ steps.manual.outputs.frontend_app || steps.filter.outputs.frontend_app }}
      terraform: ${{ steps.manual.outputs.terraform || steps.filter.outputs.terraform }}
      core: ${{ steps.manual.outputs.core || steps.filter.outputs.core }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Enable all scans for manual runs
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "fastapi=true" >> "$GITHUB_OUTPUT"
          echo "node=true" >> "$GITHUB_OUTPUT"
          echo "spring=true" >> "$GITHUB_OUTPUT"
          echo "frontend_app=true" >> "$GITHUB_OUTPUT"
          echo "terraform=true" >> "$GITHUB_OUTPUT"
          echo "core=true" >> "$GITHUB_OUTPUT"

      - name: Detect changed areas
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            fastapi:
              - ".github/workflows/ci-security-scan.yml"
              - "app/api-server-fastapi/**"
            node:
              - ".github/workflows/ci-security-scan.yml"
              - "app/api-server-node/**"
            spring:
              - ".github/workflows/ci-security-scan.yml"
              - "app/api-server-spring/**"
            frontend_app:
              - ".github/workflows/ci-security-scan.yml"
              - "app/frontend/**"
            terraform:
              - ".github/workflows/ci-security-scan.yml"
              - "infra/terraform/**"
            core:
              - ".github/workflows/ci-security-scan.yml"
              - "backend/**"
              - "frontend/**"
              - "engine/**"
              - "ismsp/**"
              - "security-tools/**"
              - "scripts/**"
              - "docker-compose.yml"
              - "docker-compose.prod.yml"
              - "Makefile"

  fastapi-security-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.fastapi == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/api-server-fastapi/requirements.txt

      - name: Install app and security dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/api-server-fastapi/requirements.txt
          pip install pytest httpx bandit pip-audit

      - name: Run FastAPI smoke tests
        env:
          PYTHONPATH: app/api-server-fastapi
        run: pytest app/api-server-fastapi/tests -q

      - name: Run Bandit SAST scan
        run: bandit -q -r app/api-server-fastapi -x app/api-server-fastapi/data,app/api-server-fastapi/tests

      - name: Audit Python dependencies
        run: pip-audit -r app/api-server-fastapi/requirements.txt

      - name: Build FastAPI container
        run: docker build -t secureflow-fastapi-ci app/api-server-fastapi

  node-security-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.node == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/api-server-node/package-lock.json

      - name: Install Node API dependencies
        working-directory: app/api-server-node
        run: npm ci

      - name: Check Node API syntax
        run: node --check app/api-server-node/src/app.js

      - name: Audit Node API dependencies
        working-directory: app/api-server-node
        run: npm audit --omit=dev --audit-level=critical

      - name: Build Node API container
        run: docker build -t secureflow-node-ci app/api-server-node

  spring-security-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.spring == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Build Spring API package
        working-directory: app/api-server-spring
        run: |
          chmod +x mvnw
          ./mvnw -q -DskipTests package

      - name: Build Spring API container
        run: docker build -t secureflow-spring-ci app/api-server-spring

  frontend-security-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_app == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: app/frontend
        run: npm audit --omit=dev --audit-level=critical

      - name: Build frontend bundle
        working-directory: app/frontend
        run: npm run build

      - name: Build frontend container
        run: docker build -t secureflow-frontend-ci app/frontend

  terraform-security-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra/terraform

      - name: Validate bootstrap Terraform
        working-directory: infra/terraform/bootstrap
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Validate root Terraform stack
        working-directory: infra/terraform
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Run Checkov IaC scan
        run: checkov -d infra/terraform --quiet --soft-fail

  core-build-and-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install root frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run platform tests
        run: pytest backend/tests engine/tests ismsp/tests -q

      - name: Build root frontend
        working-directory: frontend
        run: npm run build

  sast-semgrep:
    needs:
      - detect-changes
      - core-build-and-test
    if: needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
          semgrep --config security-tools/semgrep/.semgrep.yml --json --output semgrep-results.json . || true
          semgrep --config security-tools/semgrep/.semgrep.yml --sarif --output semgrep.sarif . || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  sast-sonarqube:
    needs:
      - detect-changes
      - core-build-and-test
    if: needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check SonarQube configuration
        id: sonar-config
        run: |
          if [ -n "${SONAR_TOKEN}" ] && [ -n "${SONAR_HOST_URL}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SonarQube secrets are not configured. Skipping SonarQube scan on this run."
          fi

      - name: SonarQube Scan
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: >
            -Dproject.settings=security-tools/sonarqube/sonar-project.properties
            -Dsonar.python.version=3.11

      - name: Export SonarQube issues
        if: steps.sonar-config.outputs.enabled == 'true'
        run: |
          SONAR_URL="${SONAR_HOST_URL}/api/issues/search?componentKeys=secureflow&types=VULNERABILITY&resolved=false&ps=500"
          curl -s -u "${SONAR_TOKEN}:" "$SONAR_URL" -o sonarqube-results.json || echo '{"issues":[]}' > sonarqube-results.json

      - name: Upload SonarQube results
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: sonarqube-results
          path: sonarqube-results.json

  sca-depcheck:
    needs:
      - detect-changes
      - core-build-and-test
    if: needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies for dependency scan
        run: |
          npm ci --prefix app/api-server-node
          npm ci --prefix app/frontend
          npm install --prefix frontend

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "secureflow"
          path: "."
          format: "JSON"
          out: "depcheck-results"
          args: >
            --enableRetired
            --suppression security-tools/dependency-check/suppression.xml
        env:
          JAVA_HOME: /opt/jdk

      - name: Upload Dependency-Check results
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-results
          path: depcheck-results/

  dast-zap:
    needs:
      - detect-changes
      - core-build-and-test
    if: needs.detect-changes.outputs.core == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Start app
        run: docker compose up -d --wait || true
        continue-on-error: true

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ vars.ZAP_TARGET_URL || 'http://localhost:3000' }}
          rules_file_name: security-tools/owasp-zap/zap-config.yaml
          cmd_options: "-J zap-results.json"
          fail_action: false

      - name: Upload ZAP results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-results
          path: zap-results.json

      - name: Stop app
        if: always()
        run: docker compose down || true
