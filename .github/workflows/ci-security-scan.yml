name: CI Security Scan

on:
  push:
    branches:
      - SUN
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  fastapi-security-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/api-server-fastapi/requirements.txt

      - name: Install app and security dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/api-server-fastapi/requirements.txt
          pip install pytest httpx bandit pip-audit

      - name: Run FastAPI smoke tests
        env:
          PYTHONPATH: app/api-server-fastapi
        run: pytest app/api-server-fastapi/tests -q

      - name: Run Bandit SAST scan
        run: bandit -q -r app/api-server-fastapi -x app/api-server-fastapi/data,app/api-server-fastapi/tests
        continue-on-error: true

      - name: Audit Python dependencies
        run: pip-audit -r app/api-server-fastapi/requirements.txt
        continue-on-error: true

      - name: Build FastAPI container
        run: docker build -t secureflow-fastapi-ci app/api-server-fastapi

  node-security-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/api-server-node/package-lock.json

      - name: Install Node API dependencies
        working-directory: app/api-server-node
        run: npm ci

      - name: Check Node API syntax
        run: node --check app/api-server-node/src/app.js

      - name: Audit Node API dependencies
        working-directory: app/api-server-node
        run: npm audit --omit=dev --audit-level=critical
        continue-on-error: true

      - name: Build Node API container
        run: docker build -t secureflow-node-ci app/api-server-node

  spring-security-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Build Spring API package
        working-directory: app/api-server-spring
        run: |
          chmod +x mvnw
          ./mvnw -q -DskipTests package

      - name: Build Spring API container
        run: docker build -t secureflow-spring-ci app/api-server-spring

  frontend-security-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: app/frontend
        run: npm audit --omit=dev --audit-level=critical
        continue-on-error: true

      - name: Build frontend bundle
        working-directory: app/frontend
        run: npm run build

      - name: Build frontend container
        run: docker build -t secureflow-frontend-ci app/frontend

  iac-checkov:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Run Checkov
        run: |
          checkov -d infra/terraform --framework terraform -o json > checkov-results.json || true
          if [ ! -f checkov-results.json ]; then
            echo '{"results":{"failed_checks":[]}}' > checkov-results.json
          fi

      - name: Upload Checkov results
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: checkov-results.json

  iac-tfsec:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run tfsec
        run: |
          docker run --rm -v "${PWD}:/workspace" aquasec/tfsec:latest \
            /workspace/infra/terraform \
            --format json \
            > tfsec-results.json 2>/dev/null || true
          if [ ! -f tfsec-results.json ] || [ ! -s tfsec-results.json ]; then
            echo '{"results":[]}' > tfsec-results.json
          fi

      - name: Upload tfsec results
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-results
          path: tfsec-results.json

  llm-iac-gate:
    needs:
      - iac-checkov
      - iac-tfsec
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download IaC artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/iac

      - name: Run IaC LLM gate
        env:
          LLM_GATE_ADVISORY_MODE: "true"
          LLM_GATE_REVIEW_BLOCKS: "false"
          PYTHONPATH: ${{ github.workspace }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          python scripts/ci/run_llm_gate.py \
            --stage iac \
            --tool-input checkov=artifacts/iac/checkov-results/checkov-results.json \
            --tool-input tfsec=artifacts/iac/tfsec-results/tfsec-results.json \
            --output artifacts/iac/iac-llm-gate.json

      - name: Upload IaC gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iac-llm-gate
          path: artifacts/iac/iac-llm-gate.json
        # CI gate output is kept in GitHub artifacts and also uploaded to /scans/gate-result.

      - name: Upload IaC gate result to SecureFlow
        if: always()
        env:
          API_SERVER_URL: ${{ secrets.API_SERVER_URL }}
          SECUREFLOW_UPLOAD_KEY: ${{ secrets.SECUREFLOW_UPLOAD_KEY }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "$API_SERVER_URL" ] || [ ! -f artifacts/iac/iac-llm-gate.json ]; then
            exit 0
          fi

          API_BASE_URL="${API_SERVER_URL%/}"
          HEADER_ARGS=()
          if [ -n "$SECUREFLOW_UPLOAD_KEY" ]; then
            HEADER_ARGS+=(-H "X-SecureFlow-Upload-Key: $SECUREFLOW_UPLOAD_KEY")
          fi

          jq -n \
            --arg stage "iac" \
            --arg commit "$COMMIT_SHA" \
            --slurpfile raw artifacts/iac/iac-llm-gate.json \
            '{stage:$stage, commit_hash:$commit, gate_result:(if ($raw | length) == 1 then $raw[0] else $raw end)}' \
            > /tmp/gate-payload.json

          curl -s -X POST "${HEADER_ARGS[@]}" "${API_BASE_URL}/scans/gate-result" \
            -H "Content-Type: application/json" \
            -d @/tmp/gate-payload.json \
            --max-time 60 || true

  service-sast-semgrep:
    needs:
      - fastapi-security-ci
      - node-security-ci
      - spring-security-ci
      - frontend-security-ci
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Semgrep on service code
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
          semgrep --config p/default --config p/security-audit --config p/python --config p/javascript --json --output semgrep-results.json app/api-server-fastapi/vulnerable_example.py app/api-server-node/vulnerable_example.js || true
          semgrep --config p/default --config p/security-audit --config p/python --config p/javascript --sarif --output semgrep.sarif app/api-server-fastapi/vulnerable_example.py app/api-server-node/vulnerable_example.js || true
          if [ ! -f semgrep-results.json ]; then
            echo '{"results":[]}' > semgrep-results.json
          fi
          if [ ! -f semgrep.sarif ]; then
            echo '{"runs":[]}' > semgrep.sarif
          fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-service-results
          path: semgrep-results.json

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  service-sast-sonarqube:
    needs:
      - fastapi-security-ci
      - node-security-ci
      - spring-security-ci
      - frontend-security-ci
    if: always()
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check SonarQube configuration
        id: sonar-config
        run: |
          if [ -n "${SONAR_TOKEN}" ] && [ -n "${SONAR_HOST_URL}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SonarQube secrets are not configured. Skipping SonarQube scan on this run."
            echo '{"issues":[],"tool_disabled":true,"reason":"missing_sonarqube_configuration"}' > sonarqube-results.json
          fi

      - name: Set up JDK 17
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Spring project
        if: steps.sonar-config.outputs.enabled == 'true'
        run: |
          cd app/api-server-spring
          chmod +x mvnw
          ./mvnw compile -q -DskipTests || echo "Maven build failed, continuing without .class files"

      - name: SonarQube service scan
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.sources=app/api-server-fastapi/vulnerable_example.py,app/api-server-node/vulnerable_example.js
            -Dsonar.inclusions=**/vulnerable_example.*
            -Dsonar.python.version=3.11
            -Dsonar.java.binaries=app/api-server-spring/target/classes

      - name: SonarCloud ?釉뚯뫒???熬곣뫁??????
        if: steps.sonar-config.outputs.enabled == 'true'
        run: |
          echo "SonarCloud ?釉뚯뫒???熬곣뫁??????繞?.."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -u "${SONAR_TOKEN}:" \
              "${SONAR_HOST_URL}/api/ce/activity?component=${{ vars.SONAR_PROJECT_KEY }}&ps=1" \
              | grep -o '"status":"[^"]*"' | head -1 || echo "")
            echo "  ??⑤객臾? $STATUS ($i/12)"
            if echo "$STATUS" | grep -q "SUCCESS"; then
              echo "SonarCloud scan finished"
              break
            fi
            sleep 10
          done

      - name: Export SonarQube issues
        if: steps.sonar-config.outputs.enabled == 'true'
        run: |
          RAW_URL="${SONAR_HOST_URL}/api/issues/search?componentKeys=${{ vars.SONAR_PROJECT_KEY }}&branch=${SONAR_BRANCH_NAME}&resolved=false&ps=500"
          FILTERED_URL="${SONAR_HOST_URL}/api/issues/search?componentKeys=${{ vars.SONAR_PROJECT_KEY }}&branch=${SONAR_BRANCH_NAME}&types=VULNERABILITY,BUG,CODE_SMELL&severities=CRITICAL,MAJOR,BLOCKER&resolved=false&ps=500"
          curl -s -u "${SONAR_TOKEN}:" "$RAW_URL" -o sonarqube-results-raw.json || echo '{"issues":[]}' > sonarqube-results-raw.json
          curl -s -u "${SONAR_TOKEN}:" "$FILTERED_URL" -o sonarqube-results.json || echo '{"issues":[]}' > sonarqube-results.json
          RAW_ISSUES=$(grep -o '"total":[0-9]*' sonarqube-results-raw.json | head -1 || echo "0")
          FILTERED_ISSUES=$(grep -o '"total":[0-9]*' sonarqube-results.json | head -1 || echo "0")
          echo "SonarCloud raw issues: $RAW_ISSUES"
          echo "SonarCloud filtered issues: $FILTERED_ISSUES"

      - name: Summarize SonarQube raw issues
        if: steps.sonar-config.outputs.enabled == 'true'
        run: |
          python - <<'PY'
          import json
          from collections import Counter
          from pathlib import Path

          raw_path = Path("sonarqube-results-raw.json")
          if not raw_path.exists():
              raw_path.write_text('{"issues":[]}', encoding="utf-8")

          data = json.loads(raw_path.read_text(encoding="utf-8"))
          issues = data.get("issues", [])
          by_type = Counter(issue.get("type", "UNKNOWN") for issue in issues)
          by_severity = Counter(issue.get("severity", "UNKNOWN") for issue in issues)

          summary = {
              "total": len(issues),
              "by_type": dict(sorted(by_type.items())),
              "by_severity": dict(sorted(by_severity.items())),
              "sample_issues": [
                  {
                      "key": issue.get("key"),
                      "type": issue.get("type"),
                      "severity": issue.get("severity"),
                      "rule": issue.get("rule"),
                      "component": issue.get("component"),
                      "line": issue.get("line"),
                      "message": issue.get("message"),
                  }
                  for issue in issues[:20]
              ],
          }
          Path("sonarqube-results-summary.json").write_text(
              json.dumps(summary, indent=2),
              encoding="utf-8",
          )
          print(json.dumps(summary, indent=2))
          PY

      - name: Upload SonarQube results
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: sonarqube-service-results
          path: |
            sonarqube-results.json
            sonarqube-results-raw.json
            sonarqube-results-summary.json

  llm-sast-gate:
    needs:
      - service-sast-semgrep
      - service-sast-sonarqube
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download SAST artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/sast

      - name: Run SAST LLM gate
        env:
          LLM_GATE_ADVISORY_MODE: "true"
          LLM_GATE_REVIEW_BLOCKS: "false"
          PYTHONPATH: ${{ github.workspace }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          python scripts/ci/run_llm_gate.py \
            --stage sast \
            --tool-input semgrep=artifacts/sast/semgrep-service-results/semgrep-results.json \
            --tool-input sonarqube=artifacts/sast/sonarqube-service-results/sonarqube-results.json \
            --output artifacts/sast/sast-llm-gate.json

      - name: Upload SAST gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-llm-gate
          path: artifacts/sast/sast-llm-gate.json
        # CI gate output is kept in GitHub artifacts and also uploaded to /scans/gate-result.

      - name: Upload SAST gate result to SecureFlow
        if: always()
        env:
          API_SERVER_URL: ${{ secrets.API_SERVER_URL }}
          SECUREFLOW_UPLOAD_KEY: ${{ secrets.SECUREFLOW_UPLOAD_KEY }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "$API_SERVER_URL" ] || [ ! -f artifacts/sast/sast-llm-gate.json ]; then
            exit 0
          fi

          API_BASE_URL="${API_SERVER_URL%/}"
          HEADER_ARGS=()
          if [ -n "$SECUREFLOW_UPLOAD_KEY" ]; then
            HEADER_ARGS+=(-H "X-SecureFlow-Upload-Key: $SECUREFLOW_UPLOAD_KEY")
          fi

          jq -n \
            --arg stage "sast" \
            --arg commit "$COMMIT_SHA" \
            --slurpfile raw artifacts/sast/sast-llm-gate.json \
            '{stage:$stage, commit_hash:$commit, gate_result:(if ($raw | length) == 1 then $raw[0] else $raw end)}' \
            > /tmp/gate-payload.json

          curl -s -X POST "${HEADER_ARGS[@]}" "${API_BASE_URL}/scans/gate-result" \
            -H "Content-Type: application/json" \
            -d @/tmp/gate-payload.json \
            --max-time 60 || true

  service-sca-depcheck:
    needs:
      - fastapi-security-ci
      - node-security-ci
      - spring-security-ci
      - frontend-security-ci
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install service dependencies for dependency scan
        run: |
          npm ci --prefix app/api-server-node
          npm ci --prefix app/frontend

      - name: Run OWASP Dependency-Check on services
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "secureflow-services"
          path: "app"
          format: "JSON"
          out: "depcheck-results"
          args: >
            --enableRetired
            --suppression security-tools/dependency-check/suppression.xml
        env:
          JAVA_HOME: /opt/jdk

      - name: Ensure Dependency-Check report exists
        run: |
          if [ ! -f depcheck-results/dependency-check-report.json ]; then
            mkdir -p depcheck-results
            echo '{"dependencies":[]}' > depcheck-results/dependency-check-report.json
          fi

      - name: Upload Dependency-Check results
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-service-results
          path: depcheck-results/

  service-sca-trivy:
    needs:
      - fastapi-security-ci
      - node-security-ci
      - spring-security-ci
      - frontend-security-ci
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan on services
        run: |
          docker run --rm -v "${PWD}:/workspace" ghcr.io/aquasecurity/trivy:latest \
            fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --format json \
            --output /workspace/trivy-results.json \
            /workspace/app || true
          if [ ! -f trivy-results.json ]; then
            echo '{"Results":[]}' > trivy-results.json
          fi

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-service-results
          path: trivy-results.json

  llm-sca-gate:
    needs:
      - service-sca-depcheck
      - service-sca-trivy
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download SCA artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/sca

      - name: Run SCA LLM gate
        env:
          LLM_GATE_ADVISORY_MODE: "true"
          LLM_GATE_REVIEW_BLOCKS: "false"
          PYTHONPATH: ${{ github.workspace }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          python scripts/ci/run_llm_gate.py \
            --stage sca \
            --tool-input depcheck=artifacts/sca/depcheck-service-results/dependency-check-report.json \
            --tool-input trivy=artifacts/sca/trivy-service-results/trivy-results.json \
            --output artifacts/sca/sca-llm-gate.json

      - name: Upload SCA gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-llm-gate
          path: artifacts/sca/sca-llm-gate.json
        # CI gate output is kept in GitHub artifacts and also uploaded to /scans/gate-result.

      - name: Upload SCA gate result to SecureFlow
        if: always()
        env:
          API_SERVER_URL: ${{ secrets.API_SERVER_URL }}
          SECUREFLOW_UPLOAD_KEY: ${{ secrets.SECUREFLOW_UPLOAD_KEY }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "$API_SERVER_URL" ] || [ ! -f artifacts/sca/sca-llm-gate.json ]; then
            exit 0
          fi

          API_BASE_URL="${API_SERVER_URL%/}"
          HEADER_ARGS=()
          if [ -n "$SECUREFLOW_UPLOAD_KEY" ]; then
            HEADER_ARGS+=(-H "X-SecureFlow-Upload-Key: $SECUREFLOW_UPLOAD_KEY")
          fi

          jq -n \
            --arg stage "sca" \
            --arg commit "$COMMIT_SHA" \
            --slurpfile raw artifacts/sca/sca-llm-gate.json \
            '{stage:$stage, commit_hash:$commit, gate_result:(if ($raw | length) == 1 then $raw[0] else $raw end)}' \
            > /tmp/gate-payload.json

          curl -s -X POST "${HEADER_ARGS[@]}" "${API_BASE_URL}/scans/gate-result" \
            -H "Content-Type: application/json" \
            -d @/tmp/gate-payload.json \
            --max-time 60 || true

  ci-release-gate:
    needs:
      - llm-iac-gate
      - llm-sast-gate
      - llm-sca-gate
    runs-on: ubuntu-latest

    steps:
      - name: Confirm CI gates passed
        run: echo "IaC, SAST, and SCA LLM gates passed for this revision."

  upload-to-secureflow:
    name: "Upload Results To SecureFlow"
    needs:
      - service-sast-semgrep
      - service-sast-sonarqube
      - service-sca-trivy
      - service-sca-depcheck
      - iac-tfsec
      - iac-checkov
      - llm-iac-gate
      - llm-sast-gate
      - llm-sca-gate
    if: always()
    runs-on: ubuntu-latest
    env:
      API_SERVER_URL: ${{ secrets.API_SERVER_URL }}
      SECUREFLOW_UPLOAD_KEY: ${{ secrets.SECUREFLOW_UPLOAD_KEY }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: scan-results/
        continue-on-error: true

      - name: List downloaded scan results
        run: find scan-results/ -name "*.json" | sort || echo "No scan results found"

      - name: Upload raw scan results to SecureFlow
        if: env.API_SERVER_URL != ''
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          API_BASE_URL="${API_SERVER_URL%/}"
          HEADER_ARGS=()
          if [ -n "$SECUREFLOW_UPLOAD_KEY" ]; then
            HEADER_ARGS+=(-H "X-SecureFlow-Upload-Key: $SECUREFLOW_UPLOAD_KEY")
          fi

          upload() {
            local tool="$1"
            local file="$2"

            if [ ! -f "$file" ]; then
              echo "Skip upload: $tool (file missing)"
              return
            fi

            echo "Uploading $tool..."
            if ! jq -n --arg tool "$tool" \
                  --arg commit "${COMMIT_SHA}" \
                  --arg project "secureflow" \
                  --arg branch "${GITHUB_REF_NAME}" \
                  --slurpfile raw "$file" \
                  '{tool:$tool, raw_result:$raw[0], commit_hash:$commit, project_name:$project, branch:$branch}' \
                  > /tmp/payload.json 2>/dev/null; then
              echo "Skip upload: failed to build payload for $tool"
              return
            fi

            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${HEADER_ARGS[@]}" "${API_BASE_URL}/scans" \
              -H "Content-Type: application/json" \
              -d @/tmp/payload.json \
              --max-time 60 || echo "000")
            echo "  -> HTTP $HTTP"
            rm -f /tmp/payload.json
          }

          upload "semgrep" "scan-results/semgrep-service-results/semgrep-results.json"
          upload "sonarqube" "scan-results/sonarqube-service-results/sonarqube-results.json"
          upload "trivy" "scan-results/trivy-service-results/trivy-results.json"
          upload "depcheck" "scan-results/depcheck-service-results/dependency-check-report.json"
          upload "tfsec" "scan-results/tfsec-results/tfsec-results.json"
          upload "checkov" "scan-results/checkov-results/checkov-results.json"
        continue-on-error: true

      - name: Wait for SecureFlow scan parsing
        if: env.API_SERVER_URL != ''
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          API_BASE_URL="${API_SERVER_URL%/}"
          HEADER_ARGS=()
          if [ -n "$SECUREFLOW_UPLOAD_KEY" ]; then
            HEADER_ARGS+=(-H "X-SecureFlow-Upload-Key: $SECUREFLOW_UPLOAD_KEY")
          fi

          for i in $(seq 1 30); do
            WAIT=$(curl -s "${HEADER_ARGS[@]}" "${API_BASE_URL}/scans" \
              | jq "[.scans[] | select(.commit_hash==\"${COMMIT_SHA}\" and (.status==\"received\" or .status==\"processing\"))] | length" 2>/dev/null || echo "0")
            DONE=$(curl -s "${HEADER_ARGS[@]}" "${API_BASE_URL}/scans" \
              | jq "[.scans[] | select(.commit_hash==\"${COMMIT_SHA}\" and .status==\"done\")] | length" 2>/dev/null || echo "0")
            echo "done=${DONE}, waiting=${WAIT} (${i}/30)"
            if [ "$WAIT" -eq 0 ] && [ "$DONE" -gt 0 ]; then
              echo "SecureFlow scan parsing finished."
              break
            fi
            sleep 5
          done
        continue-on-error: true

      - name: Refresh SecureFlow Phase 1 dashboard report
        if: env.API_SERVER_URL != ''
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          API_BASE_URL="${API_SERVER_URL%/}"
          HEADER_ARGS=()
          if [ -n "$SECUREFLOW_UPLOAD_KEY" ]; then
            HEADER_ARGS+=(-H "X-SecureFlow-Upload-Key: $SECUREFLOW_UPLOAD_KEY")
          fi

          curl -s -X POST "${HEADER_ARGS[@]}" "${API_BASE_URL}/scans/analyze" \
            -H "Content-Type: application/json" \
            -d "{\"commit_hash\":\"${COMMIT_SHA}\",\"phase\":1}" \
            --max-time 120 || true
        continue-on-error: true

      - name: Upload CI LLM gate results to SecureFlow
        if: env.API_SERVER_URL != ''
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          API_BASE_URL="${API_SERVER_URL%/}"
          HEADER_ARGS=()
          if [ -n "$SECUREFLOW_UPLOAD_KEY" ]; then
            HEADER_ARGS+=(-H "X-SecureFlow-Upload-Key: $SECUREFLOW_UPLOAD_KEY")
          fi

          for stage in iac sast sca; do
            FILE="scan-results/${stage}-llm-gate/${stage}-llm-gate.json"
            if [ -f "$FILE" ]; then
              echo "Uploading gate: $stage"
              jq -n --arg stage "$stage" --arg commit "$COMMIT_SHA" --slurpfile gate "$FILE" \
                '{stage:$stage, commit_hash:$commit, gate_result:$gate[0]}' \
              | curl -s -X POST "${HEADER_ARGS[@]}" "${API_BASE_URL}/scans/gate-result" \
                -H "Content-Type: application/json" \
                -d @- || echo "  send failed (ignored)"
            else
              echo "  Missing gate file: $FILE"
            fi
          done
        continue-on-error: true

      - name: Run individual vulnerability LLM judgments
        if: env.API_SERVER_URL != ''
        env:
          COMMIT_SHA: ${{ github.sha }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SECUREFLOW_UPLOAD_KEY: ${{ secrets.SECUREFLOW_UPLOAD_KEY }}
        run: |
          pip install -q httpx 2>/dev/null
          python scripts/ci/run_llm_judgments.py || echo "Judgment run failed (ignored)"
        continue-on-error: true

      - name: Explain missing API_SERVER_URL
        if: env.API_SERVER_URL == ''
        run: |
          echo "API_SERVER_URL secret is not configured."
          echo "Add API_SERVER_URL to GitHub Secrets to upload results to the SecureFlow backend."
          echo "Without it, scan results stay in GitHub artifacts only."
  chain-cd-seo:
    needs:
      - ci-release-gate
    if: github.event_name == 'push' && github.ref_name == 'SEO'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/cd-deploy.yml
    with:
      branch_name: ${{ github.ref_name }}
      source_sha: ${{ github.sha }}
      service: all
      run_staging: true
      run_production: false
    secrets: inherit

  chain-cd-nayoung:
    needs:
      - ci-release-gate
    if: github.event_name == 'push' && github.ref_name == 'nayoung'
    permissions:
      contents: read
