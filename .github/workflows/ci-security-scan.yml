name: CI Security Scan


on:
  push:
    paths:
      - ".github/workflows/ci-security-scan.yml"
      - "app/api-server-fastapi/**"
      - "app/api-server-node/**"
      - "app/api-server-spring/**"
      - "app/frontend/**"
      - "infra/terraform/**"
  pull_request:
    paths:
      - ".github/workflows/ci-security-scan.yml"
      - "app/api-server-fastapi/**"
      - "app/api-server-node/**"
      - "app/api-server-spring/**"
      - "app/frontend/**"
      - "infra/terraform/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      fastapi: ${{ steps.filter.outputs.fastapi }}
      node: ${{ steps.filter.outputs.node }}
      spring: ${{ steps.filter.outputs.spring }}
      frontend: ${{ steps.filter.outputs.frontend }}
      terraform: ${{ steps.filter.outputs.terraform }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            fastapi:
              - ".github/workflows/ci-security-scan.yml"
              - "app/api-server-fastapi/**"
            node:
              - ".github/workflows/ci-security-scan.yml"
              - "app/api-server-node/**"
            spring:
              - ".github/workflows/ci-security-scan.yml"
              - "app/api-server-spring/**"
            frontend:
              - ".github/workflows/ci-security-scan.yml"
              - "app/frontend/**"
            terraform:
              - ".github/workflows/ci-security-scan.yml"
              - "infra/terraform/**"

  fastapi-security-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.fastapi == 'true'
  # ── 기존: 빌드 & 테스트 ──────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/api-server-fastapi/requirements.txt

      - name: Install app and security dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/api-server-fastapi/requirements.txt
          pip install pytest httpx bandit pip-audit checkov

      - name: Run FastAPI smoke tests
        env:
          PYTHONPATH: app/api-server-fastapi
        run: pytest app/api-server-fastapi/tests -q

      - name: Run Bandit SAST scan
        run: bandit -q -r app/api-server-fastapi -x app/api-server-fastapi/data,app/api-server-fastapi/tests

      - name: Audit Python dependencies
        run: pip-audit -r app/api-server-fastapi/requirements.txt

      - name: Build FastAPI container
        run: docker build -t secureflow-fastapi-ci app/api-server-fastapi

  node-security-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.node == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/api-server-node/package-lock.json

      - name: Install Node API dependencies
        working-directory: app/api-server-node
        run: npm ci

      - name: Check Node API syntax
        run: node --check app/api-server-node/src/app.js

      - name: Audit Node API dependencies
        working-directory: app/api-server-node
        run: npm audit --omit=dev --audit-level=critical

      - name: Build Node API container
        run: docker build -t secureflow-node-ci app/api-server-node

  spring-security-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.spring == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Build Spring API package
        working-directory: app/api-server-spring
        run: |
          chmod +x mvnw
          ./mvnw -q -DskipTests package

      - name: Build Spring API container
        run: docker build -t secureflow-spring-ci app/api-server-spring

  frontend-security-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: app/frontend
        run: npm audit --omit=dev --audit-level=critical

      - name: Build frontend bundle
        working-directory: app/frontend
        run: npm run build

      - name: Build frontend container
        run: docker build -t secureflow-frontend-ci app/frontend

  terraform-security-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra/terraform

      - name: Validate bootstrap Terraform
        run: |
          cd infra/terraform/bootstrap
          terraform init -backend=false
          terraform validate

      - name: Validate root Terraform stack
        run: |
          cd infra/terraform
          terraform init -backend=false
          terraform validate

      - name: Run Checkov IaC scan
        run: checkov -d infra/terraform --quiet --soft-fail

      - run: python -m pip install --upgrade pip && pip install -r backend/requirements.txt

      - run: cd frontend && npm install

      - run: pytest backend/tests -q

      - run: cd frontend && npm run build

  # ── SAST: Semgrep ────────────────────────────────────────────────────────
  sast-semgrep:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      security-events: write   # SARIF 업로드용
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config security-tools/semgrep/.semgrep.yml \
                  --json --output semgrep-results.json \
                  . || true
          semgrep --config security-tools/semgrep/.semgrep.yml \
                  --sarif --output semgrep.sarif \
                  . || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  # ── SAST: SonarQube ──────────────────────────────────────────────────────
  sast-sonarqube:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarQube blame 분석에 전체 히스토리 필요

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=secureflow
            -Dsonar.sources=backend,frontend,engine,ismsp
            -Dsonar.python.version=3.11

      - name: Export SonarQube Issues (JSON)
        run: |
          SONAR_URL="${{ secrets.SONAR_HOST_URL }}/api/issues/search?componentKeys=secureflow&types=VULNERABILITY&resolved=false&ps=500"
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" "$SONAR_URL" -o sonarqube-results.json || echo '{"issues":[]}' > sonarqube-results.json

      - name: Upload SonarQube results
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: sonarqube-results
          path: sonarqube-results.json

  # ── SCA: OWASP Dependency-Check ──────────────────────────────────────────
  sca-depcheck:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "secureflow"
          path: "."
          format: "JSON"
          out: "depcheck-results"
          args: >
            --enableRetired
            --suppression security-tools/dependency-check/suppression.xml
        env:
          JAVA_HOME: /opt/jdk

      - name: Upload Dependency-Check results
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-results
          path: depcheck-results/

  # ── DAST: OWASP ZAP (Baseline) ───────────────────────────────────────────
  # 배포된 앱이 있을 때만 실행 (main 브랜치 push 또는 수동 트리거)
  dast-zap:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Start app (Docker Compose)
        run: |
          docker compose up -d --wait || true
        continue-on-error: true

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ vars.ZAP_TARGET_URL || 'http://localhost:3000' }}
          rules_file_name: security-tools/owasp-zap/zap-config.yaml
          cmd_options: "-J zap-results.json"
          fail_action: false   # 취약점 발견해도 파이프라인 실패 안 함

      - name: Upload ZAP results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-results
          path: zap-results.json

      - name: Stop app
        if: always()
        run: docker compose down || true
