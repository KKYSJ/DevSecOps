name: SecureFlow Dashboard Auto Deploy

on:
  push:
    branches:
      - SUN
    paths:
      - ".github/workflows/secureflow-dashboard-deploy.yml"
      - ".github/workflows/secureflow-dashboard-auto-deploy.yml"
      - "secureflow_dashboard_infra/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      deployment_mode:
        description: "Terraform deploy mode"
        required: true
        default: "waf_only"
        type: choice
        options:
          - waf_only
          - service
          - infra_only

permissions:
  contents: read
  id-token: write

jobs:
  deploy-on-push:
    if: github.event_name == 'push'
    uses: ./.github/workflows/secureflow-dashboard-deploy.yml
    with:
      environment: dev
      deployment_mode: waf_only
    secrets: inherit

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/secureflow-dashboard-deploy.yml
    with:
      environment: ${{ inputs.environment }}
      deployment_mode: ${{ inputs.deployment_mode }}
    secrets: inherit
