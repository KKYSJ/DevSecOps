version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-secureflow}
      POSTGRES_USER: ${POSTGRES_USER:-secureflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secureflow}
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: [.env]
    ports: ["${BACKEND_PORT:-8000}:8000"]
    depends_on: [postgres, redis]
    volumes: ["./:/app"]
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    env_file: [.env]
    environment:
      - PYTHONPATH=/app
    depends_on: [backend, postgres, redis]
    volumes: ["./:/app"]
    command: celery -A backend.app.core.celery_app.celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on: [backend]
    ports: ["${FRONTEND_PORT:-3000}:80"]

  sonarqube:
    image: sonarqube:community
    ports: ["9000:9000"]

volumes:
  postgres_data:
  redis_data:
